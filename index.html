<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt V91.0 - Multi-Engine</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text); -webkit-tap-highlight-color: transparent; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px; border: 1px solid #edf2f7; }
        .btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 10px; }
        select, input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; margin: 10px 0; box-sizing: border-box; background: white; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: white; display: flex; align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-item { border: none; background: none; color: #64748b; display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: center; }
        .nav-item i { font-size: 28px; font-style: normal; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
        .status-loading { color: var(--primary); font-weight: bold; animation: pulse 1.5s infinite; text-align: center; padding: 10px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container" id="main-view"></div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="ui.render('home', this)"><i>🏠</i><span>Despensa</span></button>
    <button class="nav-item" onclick="ui.render('scan', this)"><i>📸</i><span>Scan</span></button>
    <button class="nav-item" onclick="ui.render('search', this)"><i>🔍</i><span>Procurar</span></button>
    <button class="nav-item" onclick="ui.render('data', this)"><i>💾</i><span>Dados</span></button>
</nav>

<script>
/** * DB & STATE */
const app = {
    db: JSON.parse(localStorage.getItem('saco_db')) || {
        inventory: {}, 
        loyalty: { total_saved: 0 },
        config: { api_key: '', model: 'gemini-1.5-flash' }
    },
    save() { localStorage.setItem('saco_db', JSON.stringify(this.db)); }
};

/** * UI ENGINE */
const ui = {
    render(tab, el) {
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        const view = document.getElementById('main-view');

        if (tab === 'home') {
            view.innerHTML = `
                <h2>O Meu Stock 🏠</h2>
                <div class="card" style="background: var(--primary); color: white;">
                    <small>Poupança Total</small>
                    <div style="font-size: 32px; font-weight: bold;">${app.db.loyalty.total_saved.toFixed(2)}€</div>
                </div>
                ${this.renderInventory()}
            `;
        }

        if (tab === 'search') {
            view.innerHTML = `
                <h2>Procura Rápida 🔍</h2>
                <div class="card">
                    <input type="text" id="item-input" placeholder="Ex: Cerveja, Leite...">
                    <button class="btn" onclick="logic.findNow()">Pesquisar com ${app.db.config.model.split('-').pop().toUpperCase()}</button>
                    <div id="search-result" style="margin-top:20px;"></div>
                </div>
            `;
        }

        if (tab === 'data') {
            view.innerHTML = `
                <h2>Configurações ⚙️</h2>
                <div class="card">
                    <label><b>API Key (Google AI Studio)</b></label>
                    <input type="password" id="api-key" value="${app.db.config.api_key}" placeholder="Cola a tua chave">
                    
                    <label><b>Selecionar Motor (Model)</b></label>
                    <select id="model-select">
                        <option value="gemini-1.5-flash" ${app.db.config.model === 'gemini-1.5-flash' ? 'selected' : ''}>Gemini 1.5 Flash (Rápido/Grátis)</option>
                        <option value="gemini-1.5-pro" ${app.db.config.model === 'gemini-1.5-pro' ? 'selected' : ''}>Gemini 1.5 Pro (Mais Inteligente)</option>
                        <option value="gemini-1.0-pro" ${app.db.config.model === 'gemini-1.0-pro' ? 'selected' : ''}>Gemini 1.0 Pro</option>
                    </select>
                    
                    <button class="btn" onclick="logic.saveSettings()">✅ Guardar e Validar</button>
                    <button class="btn btn-outline" onclick="logic.export()">📥 Backup JSON</button>
                </div>
            `;
        }
    },
    renderInventory() {
        const items = Object.values(app.db.inventory);
        return items.length ? items.map(i => `<div class="card"><b>${i.nome}</b><br><small>${i.qtd} un | ${i.unit_price}€</small></div>`).join('') : '<p style="text-align:center">Stock vazio.</p>';
    }
};

/** * LOGIC ENGINE */
const logic = {
    saveSettings() {
        const key = document.getElementById('api-key').value;
        const model = document.getElementById('model-select').value;
        app.db.config.api_key = key;
        app.db.config.model = model;
        app.save();
        alert(`Configurações Guardadas!\nMotor: ${model}`);
    },

    async findNow() {
        const query = document.getElementById('item-input').value;
        const resDiv = document.getElementById('search-result');
        const { api_key, model } = app.db.config;

        if(!query || !api_key) return alert("Verifica a chave e o nome do artigo!");

        resDiv.innerHTML = `<div class="status-loading">🤖 ${model} a pesquisar folhetos...</div>`;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const prompt = `Responde APENAS com JSON: {"nome": "Nome Completo", "loja": "Loja", "preco": "0.00€"}. 
                            Procura o melhor preço para "${query}" perto de ${pos.coords.latitude}, ${pos.coords.longitude} em Portugal.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${api_key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const res = JSON.parse(cleanJson);

                resDiv.innerHTML = `
                    <div class="card" style="border: 2px solid var(--primary);">
                        <h4>${res.nome}</h4>
                        <p>📍 <b>${res.loja}</b></p>
                        <h2 style="color:var(--success)">${res.preco}</h2>
                        <button class="btn" style="background:#4285F4" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(res.loja + ' ' + res.nome)}')">🗺️ Ver no Maps</button>
                    </div>`;
            } catch (e) {
                resDiv.innerHTML = `<p style="color:red">Erro: Verifica a tua API Key ou o limite do motor ${model}.</p>`;
            }
        });
    },

    export() {
        const blob = new Blob([JSON.stringify(app.db)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'saco_db.json'; a.click();
    }
};

ui.render('home');
</script>
</body>
</html>
