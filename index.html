<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SACO.pt V93.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

:root {
  --p: #1a56db;
  --p2: #1e429f;
  --g: #057a55;
  --r: #e02424;
  --o: #d97706;
  --bg: #f1f5f9;
  --card: #ffffff;
  --txt: #0f172a;
  --sub: #64748b;
  --border: #e2e8f0;
  --nav-h: 74px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); padding-bottom: calc(var(--nav-h) + 16px); }

h1, h2, .logo { font-family: 'Syne', sans-serif; }

/* HEADER */
.header {
  background: var(--card);
  padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.04);
}
.logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--p); }
.version-badge { background: #eff6ff; color: var(--p); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

/* CONTAINER */
.container { padding: 16px; max-width: 560px; margin: 0 auto; }

/* CARD */
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  animation: fadeUp .25s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* BUTTONS */
.btn {
  border: none; border-radius: 14px; padding: 15px 20px;
  font-weight: 700; font-size: 15px; font-family: 'DM Sans', sans-serif;
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; transition: all .15s; margin-top: 10px; color: #fff;
}
.btn:active { transform: scale(.97); }
.btn-p  { background: var(--p); }
.btn-g  { background: var(--g); }
.btn-r  { background: var(--r); }
.btn-o  { background: var(--o); }
.btn-ghost { background: transparent; border: 2px solid var(--border); color: var(--txt); }
.btn-sm { padding: 9px 14px; font-size: 13px; width: auto; border-radius: 10px; }
.btn:disabled { opacity: .45; pointer-events: none; }

/* INPUTS */
input[type=text], input[type=password], textarea, select {
  width: 100%; padding: 13px 15px;
  border: 2px solid var(--border); border-radius: 12px;
  font-size: 15px; font-family: 'DM Sans', sans-serif;
  background: #f8fafc; color: var(--txt); outline: none;
  transition: border-color .2s; margin: 6px 0;
}
input:focus, select:focus { border-color: var(--p); background: #fff; }

/* NAV */
.nav {
  position: fixed; bottom: 0; left: 0; width: 100%;
  height: var(--nav-h); background: var(--card);
  border-top: 1px solid var(--border); z-index: 500;
  display: flex; align-items: stretch;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -4px 20px rgba(0,0,0,.06);
}
.nav-btn {
  flex: 1; border: none; background: none; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  color: var(--sub); font-size: 10px; font-weight: 600; gap: 3px;
  font-family: 'DM Sans', sans-serif; cursor: pointer; transition: color .15s;
}
.nav-btn i { font-size: 22px; font-style: normal; line-height: 1; }
.nav-btn.active { color: var(--p); }
.nav-btn.active i { transform: scale(1.1); }

/* CAMERA OVERLAY */
#cam-overlay {
  display: none; position: fixed; inset: 0;
  background: #000; z-index: 2000;
  flex-direction: column; align-items: center; justify-content: space-between;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
}
#cam-overlay.show { display: flex; }
#cam-video { width: 100%; max-height: 55vh; border-radius: 16px; object-fit: cover; background: #111; }
.cam-counter {
  font-family: 'Syne', sans-serif; font-size: 52px; color: #fff;
  text-shadow: 0 2px 12px rgba(0,0,0,.5);
}
.cam-thumbs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; width: 100%; scrollbar-width: none; }
.cam-thumbs::-webkit-scrollbar { display: none; }
.cam-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(255,255,255,.3); }
.cam-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }

/* INVENTORY */
.inv-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 0; border-bottom: 1px solid var(--border);
  animation: fadeUp .2s ease both;
}
.inv-item:last-child { border-bottom: none; }
.inv-name { font-weight: 600; font-size: 14px; }
.inv-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
.inv-actions { display: flex; gap: 8px; align-items: center; }
.qty-btn {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  font-size: 18px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); color: var(--txt); transition: background .15s;
}
.qty-btn:active { background: var(--border); }
.qty-val { font-weight: 700; font-size: 15px; min-width: 24px; text-align: center; }
.del-btn { background: #fef2f2; color: var(--r); border: none; border-radius: 8px; width: 30px; height: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* SHOPPING LIST */
.shop-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
}
.shop-item:last-child { border-bottom: none; }
.shop-check {
  width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
  flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.shop-check.done { background: var(--g); border-color: var(--g); }
.shop-check.done::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }
.shop-item-name { font-size: 14px; font-weight: 500; flex: 1; }
.shop-item-name.done { text-decoration: line-through; color: var(--sub); }

/* SEARCH RESULTS */
.result-card {
  border-left: 4px solid var(--p); padding: 14px; margin-top: 10px;
  background: #f8faff; border-radius: 0 12px 12px 0;
}
.result-winner { border-left-color: var(--g); background: #f0fdf4; }
.result-price { font-size: 22px; font-weight: 800; font-family: 'Syne', sans-serif; color: var(--p); }
.result-store { font-size: 12px; color: var(--sub); margin-bottom: 4px; }

/* PROMOS */
.promo-card {
  border-radius: 16px; padding: 15px; margin-bottom: 12px;
  border: 1px solid var(--border); background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.promo-pct { font-size: 24px; font-weight: 900; font-family: 'Syne', sans-serif; color: var(--r); float: right; }
.promo-badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; }
.badge-on { background: #ecfdf5; color: var(--g); }
.badge-soon { background: #fffbeb; color: var(--o); }
.promo-title { font-size: 14px; font-weight: 700; line-height: 1.3; }
.promo-store { font-size: 12px; color: var(--sub); }
.filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-pill {
  border: 1.5px solid var(--border); background: #fff; border-radius: 20px;
  padding: 6px 14px; font-size: 12px; font-weight: 600; white-space: nowrap;
  color: var(--sub); flex-shrink: 0; cursor: pointer;
}
.filter-pill.on { background: var(--p); border-color: var(--p); color: #fff; }

/* INFLATE BARS */
.ibar-wrap { margin: 8px 0; }
.ibar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; color: var(--sub); }
.ibar-track { background: #e2e8f0; border-radius: 20px; height: 8px; }
.ibar-fill { height: 8px; border-radius: 20px; transition: width .8s cubic-bezier(.4,0,.2,1); }
.ibar-up { background: var(--r); }
.ibar-dn { background: var(--g); }

/* TABS */
.tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.tab { flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; background: var(--bg); color: var(--sub); transition: all .15s; }
.tab.on { background: var(--p); color: #fff; }

/* MODAL */
#modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1500; backdrop-filter: blur(4px); overflow-y: auto; padding: 20px; }
#modal.show { display: flex; align-items: flex-start; justify-content: center; }
.modal-box { background: #fff; border-radius: 24px; padding: 22px; width: 100%; max-width: 480px; margin: auto; }
.modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 14px; }

/* SPINNER */
.spin { border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; width: 18px; height: 18px; animation: rot .7s linear infinite; display: inline-block; }
@keyframes rot { to{transform:rotate(360deg)} }

/* SECTION TITLE */
.sec-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
.sec-title small { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--sub); }

/* EMPTY STATE */
.empty { text-align: center; padding: 32px 20px; color: var(--sub); }
.empty-icon { font-size: 48px; margin-bottom: 10px; }
.empty p { font-size: 14px; line-height: 1.5; }

/* TOAST */
#toast {
  position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px);
  background: #1e293b; color: #fff; padding: 12px 22px; border-radius: 30px;
  font-size: 14px; font-weight: 600; z-index: 3000; opacity: 0;
  transition: all .3s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* AI OUTPUT */
.ai-block { background: #f8faff; border: 1px solid #dbeafe; border-radius: 12px; padding: 14px; margin-top: 10px; }
.ai-block h4 { font-size: 13px; color: var(--p); font-weight: 700; margin-bottom: 6px; }
.ai-block p { font-size: 13px; line-height: 1.6; color: var(--txt); }

/* BENEFITS */
.ben-section { margin-top: 20px; }
.ben-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; margin-bottom: 10px; }
.ben-card { border-radius: 16px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); background: #fff; position: relative; overflow: hidden; }
.ben-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
.ben-fidel::before { background: var(--p); }
.ben-cash::before  { background: var(--g); }
.ben-cupao::before { background: var(--o); }
.ben-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ben-icon { font-size: 22px; }
.ben-name { font-weight: 700; font-size: 14px; }
.ben-store { font-size: 11px; color: var(--sub); }
.ben-active { display: inline-block; background: #ecfdf5; color: var(--g); font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; margin-left: auto; }
.ben-inactive { background: #f1f5f9; color: var(--sub); }
.ben-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 0; border-bottom: 1px solid #f1f5f9; }
.ben-row:last-child { border-bottom: none; }
.ben-row b { color: var(--g); }
.ben-toggle { width: 44px; height: 24px; border-radius: 12px; border: none; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
.ben-toggle.on  { background: var(--g); }
.ben-toggle.off { background: #cbd5e1; }
.ben-toggle::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; transition: left .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
.ben-toggle.on::after  { left: 23px; }
.ben-toggle.off::after { left: 3px; }

/* RESULT BENEFITS ROW */
.res-ben { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.res-ben-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
.tag-fidel { background: #eff6ff; color: var(--p); }
.tag-cash  { background: #ecfdf5; color: var(--g); }
.tag-cupao { background: #fffbeb; color: var(--o); }
.price-base  { font-size: 13px; color: var(--sub); text-decoration: line-through; }
.price-final { font-size: 22px; font-weight: 900; font-family: 'Syne', sans-serif; color: var(--g); }
.price-saving { font-size: 12px; color: var(--g); font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">SACO<span>.pt</span></div>
  <span class="version-badge">V93.1</span>
</div>

<div class="container" id="main-view"></div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" data-tab="home"    onclick="ui.go('home',this)"><i>🏠</i>Despensa</button>
  <button class="nav-btn" data-tab="scan"    onclick="ui.go('scan',this)"><i>📸</i>Scan</button>
  <button class="nav-btn" data-tab="search"  onclick="ui.go('search',this)"><i>🔍</i>Procura</button>
  <button class="nav-btn" data-tab="benefits" onclick="ui.go('benefits',this)"><i>💳</i>Benefícios</button>
  <button class="nav-btn" data-tab="promos"  onclick="ui.go('promos',this)"><i>🏷️</i>Promos</button>
  <button class="nav-btn" data-tab="config"  onclick="ui.go('config',this)"><i>⚙️</i>Config</button>
</nav>

<!-- CAMERA OVERLAY -->
<div id="cam-overlay">
  <div class="cam-thumbs" id="cam-thumbs"></div>
  <video id="cam-video" autoplay playsinline muted></video>
  <div class="cam-actions">
    <button class="btn btn-p" onclick="scanner.snap()">📸 Capturar Foto</button>
    <button class="btn btn-g" id="btn-process" onclick="scanner.process()" disabled>✅ Processar com IA (<span id="snap-count">0</span>)</button>
    <button class="btn btn-ghost" style="color:#fff;border-color:rgba(255,255,255,.3);" onclick="scanner.stop()">✖ Cancelar</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const app = {
  db: JSON.parse(localStorage.getItem('sacoV93')) || {
    inventory: {},
    shopping: [],
    config: { api_key: '', model: 'models/gemini-1.5-flash', models: [] },
    benefits: {
      fidel:   [],   // { id, label, loja, tipo:'pct'|'pontos', valor, ativo }
      cashback:[],   // { id, label, cartao, banco, pct, ativo }
      cupoes:  []    // { id, desc, loja, valor, validade, used }
    },
    promos: []       // { id, store, title, pct, cat, badge, data }
  },
  save() { localStorage.setItem('sacoV93', JSON.stringify(this.db)); },
  nextId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); },
  migrate() {
    // Se benefits não existe, inicializa
    if(!this.db.benefits) this.db.benefits = { fidel:[], cashback:[], cupoes:[] };
    // Converte objetos antigos para arrays
    if(!Array.isArray(this.db.benefits.fidel))    this.db.benefits.fidel    = [];
    if(!Array.isArray(this.db.benefits.cashback)) this.db.benefits.cashback = [];
    if(!Array.isArray(this.db.benefits.cupoes))   this.db.benefits.cupoes   = [];
    if(!Array.isArray(this.db.promos))            this.db.promos            = [];
    this.save();
  }
};
app.migrate();

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg, dur=2400) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── MODAL ──────────────────────────────────────────────────────────────────
const modal = {
  show(html) {
    document.getElementById('modal-box').innerHTML = html;
    document.getElementById('modal').classList.add('show');
  },
  hide() { document.getElementById('modal').classList.remove('show'); }
};
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') modal.hide(); });

// ── UI ─────────────────────────────────────────────────────────────────────
const ui = {
  current: 'home',
  go(tab, el) {
    this.current = tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if(el) el.classList.add('active');
    this.render(tab);
  },
  render(tab) {
    const v = document.getElementById('main-view');
    v.innerHTML = '';
    if(tab==='home')     this.renderHome(v);
    if(tab==='scan')     this.renderScan(v);
    if(tab==='search')   this.renderSearch(v);
    if(tab==='benefits') this.renderBenefits(v);
    if(tab==='promos')   this.renderPromos(v);
    if(tab==='config')   this.renderConfig(v);
  },

  // ── HOME ────────────────────────────────────────────────────────────────
  renderHome(v) {
    const inv = Object.values(app.db.inventory);
    const low = inv.filter(i => i.qty <= 1);
    const shop = app.db.shopping;

    // Stats bar
    v.innerHTML += `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
        <div class="card" style="padding:14px;text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--p)">${inv.length}</div>
          <div style="font-size:11px;color:var(--sub);font-weight:600;">Artigos</div>
        </div>
        <div class="card" style="padding:14px;text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--r)">${low.length}</div>
          <div style="font-size:11px;color:var(--sub);font-weight:600;">Em falta</div>
        </div>
        <div class="card" style="padding:14px;text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--g)">${shop.length}</div>
          <div style="font-size:11px;color:var(--sub);font-weight:600;">Lista</div>
        </div>
      </div>`;

    // Low stock alert
    if(low.length) {
      v.innerHTML += `<div class="card" style="border-left:4px solid var(--o);padding:14px;">
        <div style="font-weight:700;font-size:13px;margin-bottom:6px;">⚠️ Stock Baixo</div>
        ${low.map(i=>`<span style="background:#fffbeb;color:var(--o);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:2px;display:inline-block;">${i.name}</span>`).join('')}
        <button class="btn btn-o btn-sm" style="margin-top:10px;width:auto;padding:9px 16px;" onclick="logic.addLowToList()">➕ Adicionar à Lista</button>
      </div>`;
    }

    // Tabs: Despensa | Lista
    v.innerHTML += `<div class="tabs"><button class="tab on" id="tab-inv" onclick="ui.showTab('inv')">📦 Despensa</button><button class="tab" id="tab-shop" onclick="ui.showTab('shop')">🛒 Lista de Compras</button></div>`;

    // Inventory panel
    const invHtml = inv.length
      ? inv.sort((a,b)=>a.name.localeCompare(b.name)).map(i=>`
          <div class="inv-item" id="inv-${i.id}">
            <div>
              <div class="inv-name">${i.name}</div>
              <div class="inv-meta">${i.cat||'Geral'} · atualizado ${i.updated||'agora'}</div>
            </div>
            <div class="inv-actions">
              <button class="qty-btn" onclick="logic.changeQty('${i.id}',-1)">−</button>
              <span class="qty-val">${i.qty}</span>
              <button class="qty-btn" onclick="logic.changeQty('${i.id}',+1)">+</button>
              <button class="del-btn" onclick="logic.delItem('${i.id}')">🗑</button>
            </div>
          </div>`).join('')
      : `<div class="empty"><div class="empty-icon">📦</div><p>Despensa vazia.<br>Faz scan de um recibo ou adiciona manualmente.</p></div>`;

    v.innerHTML += `<div class="card" id="panel-inv">
      <div class="sec-title">Despensa <button class="btn-ghost btn-sm btn" style="width:auto;" onclick="logic.addManual()">+ Adicionar</button></div>
      ${invHtml}
    </div>`;

    // Shopping panel
    const shopHtml = shop.length
      ? shop.map(s=>`
          <div class="shop-item">
            <div class="shop-check ${s.done?'done':''}" onclick="logic.toggleShop('${s.id}')"></div>
            <span class="shop-item-name ${s.done?'done':''}">${s.name}</span>
            <button class="del-btn" onclick="logic.delShop('${s.id}')">🗑</button>
          </div>`).join('')
      : `<div class="empty"><div class="empty-icon">🛒</div><p>Lista vazia.<br>Adiciona itens ou gera a partir da despensa.</p></div>`;

    v.innerHTML += `<div class="card" id="panel-shop" style="display:none;">
      <div class="sec-title">Lista de Compras
        <div style="display:flex;gap:6px;">
          <button class="btn-ghost btn-sm btn" style="width:auto;" onclick="logic.addShopManual()">+</button>
          <button class="btn btn-sm btn-r" style="width:auto;" onclick="logic.clearDone()">🧹</button>
        </div>
      </div>
      ${shopHtml}
    </div>`;
  },

  showTab(t) {

// ── LOGIC ──────────────────────────────────────────────────────────────────
const logic = {

  // Inventory
  changeQty(id, delta) {
    const item = app.db.inventory[id];
    if(!item) return;
    item.qty = Math.max(0, item.qty + delta);
    item.updated = new Date().toLocaleDateString('pt-PT');
    app.save();
    // Update in-place
    const row = document.getElementById('inv-'+id);
    if(row) row.querySelector('.qty-val').textContent = item.qty;
    // Add to shopping if hits 0
    if(item.qty === 0) {
      this.addToShop(item.name);
      toast(`${item.name} adicionado à lista 🛒`);
    }
  },

  delItem(id) {
    if(!confirm('Apagar este item?')) return;
    delete app.db.inventory[id];
    app.save();
    toast('Item removido');
    ui.render('home');
  },

  addManual() {
    modal.show(`
      <div class="modal-title">➕ Adicionar Item</div>
      <input type="text" id="m-name" placeholder="Nome do produto">
      <input type="text" id="m-cat" placeholder="Categoria (ex: Laticínios)">
      <input type="text" id="m-qty" placeholder="Quantidade" value="1">
      <button class="btn btn-p" onclick="logic.saveManual()">Guardar</button>
      <button class="btn btn-ghost" onclick="modal.hide()" style="margin-top:6px;">Cancelar</button>`);
    setTimeout(()=>document.getElementById('m-name').focus(),100);
  },

  saveManual() {
    const name = document.getElementById('m-name').value.trim();
    const cat  = document.getElementById('m-cat').value.trim();
    const qty  = parseInt(document.getElementById('m-qty').value)||1;
    if(!name) return toast('Escreve o nome!');
    const id = app.nextId();
    app.db.inventory[id] = { id, name, cat: cat||'Geral', qty, updated: new Date().toLocaleDateString('pt-PT') };
    app.save();
    modal.hide();
    toast(`${name} adicionado ✅`);
    ui.render('home');
  },

  addToShop(name) {
    if(app.db.shopping.find(s=>s.name.toLowerCase()===name.toLowerCase())) return;
    app.db.shopping.push({ id: app.nextId(), name, done: false });
    app.save();
  },

  addLowToList() {
    const low = Object.values(app.db.inventory).filter(i=>i.qty<=1);
    low.forEach(i=>this.addToShop(i.name));
    app.save();
    toast(`${low.length} itens adicionados à lista 🛒`);
    ui.go('home', document.querySelector('[data-tab="home"]'));
    setTimeout(()=>ui.showTab('shop'),50);
  },

  toggleShop(id) {
    const s = app.db.shopping.find(x=>x.id===id);
    if(s) { s.done = !s.done; app.save(); ui.render('home'); setTimeout(()=>ui.showTab('shop'),10); }
  },

  delShop(id) {
    app.db.shopping = app.db.shopping.filter(s=>s.id!==id);
    app.save();
    ui.render('home');
    setTimeout(()=>ui.showTab('shop'),10);
  },

  clearDone() {
    app.db.shopping = app.db.shopping.filter(s=>!s.done);
    app.save();
    ui.render('home');
    setTimeout(()=>ui.showTab('shop'),10);
    toast('Itens concluídos removidos 🧹');
  },

  addShopManual() {
    modal.show(`
      <div class="modal-title">🛒 Adicionar à Lista</div>
      <input type="text" id="sl-name" placeholder="Nome do produto">
      <button class="btn btn-p" onclick="logic.saveShopManual()">Adicionar</button>
      <button class="btn btn-ghost" onclick="modal.hide()" style="margin-top:6px;">Cancelar</button>`);
    setTimeout(()=>document.getElementById('sl-name').focus(),100);
  },

  saveShopManual() {
    const name = document.getElementById('sl-name').value.trim();
    if(!name) return;
    this.addToShop(name);
    modal.hide();
    toast(`${name} adicionado 🛒`);
    ui.render('home');
    setTimeout(()=>ui.showTab('shop'),10);
  },

  // Search
  async search() {
    const q = document.getElementById('q-in').value.trim();
    const res = document.getElementById('q-res');
    if(!q) return toast('Escreve um produto!');
    const { api_key, model } = app.db.config;
    if(!api_key) return toast('Configura a API Key! ⚙️');

    // Build active benefits context
    const b = app.db.benefits;
    const activeFidel  = b.fidel.filter(x=>x.ativo).map(x=>
      x.tipo==='pct' ? `${x.label} em ${x.loja} (${x.valor}% desconto)` : `${x.label} em ${x.loja} (${x.valor} pontos/€)`
    );
    const activeCash   = b.cashback.filter(x=>x.ativo).map(x=>`${x.cartao} da ${x.banco} (${x.pct}% cashback em todas as lojas)`);
    const activeCupoes = b.cupoes.filter(x=>!x.used).map(x=>`${x.desc} em ${x.loja}: ${x.valor} (válido até ${x.validade})`);

    const benCtx = [
      activeFidel.length  ? `Cartões fidelização ativos: ${activeFidel.join(', ')}` : '',
      activeCash.length   ? `Cashback ativo: ${activeCash.join(', ')}` : '',
      activeCupoes.length ? `Cupões disponíveis: ${activeCupoes.join(', ')}` : '',
    ].filter(Boolean).join('\n');

    res.innerHTML = `<div style="text-align:center;padding:20px;color:var(--sub)"><div class="spin" style="border-top-color:var(--p);margin:0 auto 10px;"></div>A comparar preços com benefícios...</div>`;

    const prompt = `És um assistente de compras em Portugal. Compara preços do seguinte produto nos principais supermercados portugueses (Continente, Pingo Doce, Lidl, Aldi, Intermarché, Mercadona).

O utilizador tem os seguintes benefícios ativos:
${benCtx || 'Nenhum benefício ativo.'}

Para cada loja, aplica os benefícios relevantes (ex: cartão Continente só aplica no Continente, cashback aplica em todas).
Devolve os cupões se houver correspondência com a loja.

Responde APENAS em JSON válido sem markdown:
{
  "produto": "nome completo",
  "comparacao": [
    {
      "loja": "nome",
      "preco_base": "X.XX",
      "fidel_pct": 0,
      "fidel_label": "",
      "cash_pct": 0,
      "cash_label": "",
      "cupao": "",
      "cupao_val": "",
      "preco_final": "X.XX",
      "poupanca_total": "X.XX"
    }
  ],
  "melhor_base": "nome loja mais barata sem benefícios",
  "melhor_final": "nome loja mais barata com benefícios"
}

Produto: ${q}`;

    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${api_key}`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.2}})
      });
      const d = await r.json();
      if(d.error) { res.innerHTML=`<div style="color:var(--r);padding:10px;">Erro: ${d.error.message}</div>`; return; }
      const raw = d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
      const obj = JSON.parse(raw);

      const hasBenefits = activeFidel.length || activeCash.length || activeCupoes.length;

      res.innerHTML = `
        <div style="margin-top:14px;">
          <div style="font-weight:700;font-size:15px;margin-bottom:4px;">📦 ${obj.produto}</div>
          ${hasBenefits ? `<div style="font-size:12px;color:var(--sub);margin-bottom:12px;">💡 Preços com os teus benefícios aplicados</div>` : ''}
          ${obj.comparacao.map(c => {
            const isBestFinal = c.loja === obj.melhor_final;
            const isBestBase  = c.loja === obj.melhor_base;
            const hasBen = c.fidel_pct || c.cash_pct || c.cupao;
            return `
            <div class="result-card ${isBestFinal ? 'result-winner' : ''}">
              <div class="result-store">${isBestFinal ? '🏆 ' : isBestBase ? '💲 ' : ''}${c.loja}</div>
              ${hasBen ? `<div class="price-base">${c.preco_base}€ base</div>` : ''}
              <div class="${hasBen ? 'price-final' : 'result-price'}">${c.preco_final}€</div>
              ${hasBen ? `<div class="price-saving">Poupas ${c.poupanca_total}€</div>` : ''}
              <div class="res-ben">

    } catch(e) {
      res.innerHTML = `<div style="color:var(--r);padding:10px;">Erro ao processar resposta. Tenta novamente.</div>`;
      console.error(e);
    }
  },

  // Models
  onKeyChange() {
    // If user edits the key, invalidate cached models so they must reload
    const key = document.getElementById('cfg-key').value.trim();
    if(key !== app.db.config.api_key) {
      const status = document.getElementById('model-status');
      if(status) status.innerHTML = '<span style="color:var(--o);">⚠️ Chave alterada — carrega os modelos novamente.</span>';
    }
  },

  async fetchModels() {
    const key = document.getElementById('cfg-key').value.trim();
    if(!key) return toast('Insere a API Key primeiro!');
    const btn = document.getElementById('btn-load-models');
    if(btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> A carregar...'; }
    const status = document.getElementById('model-status');
    if(status) status.innerHTML = '<span style="color:var(--sub);font-size:12px;">🔄 A contactar a API...</span>';
    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}&pageSize=200`);
      const d = await r.json();
      if(d.error) {
        if(status) status.innerHTML = `<span style="color:var(--r);font-size:12px;">❌ ${d.error.message}</span>`;
        if(btn) { btn.disabled=false; btn.innerHTML='🔄 Carregar Modelos da API'; }
        return;
      }
      const supported = (d.models||[])
        .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
        .map(m => ({ name: m.name, displayName: m.displayName || m.name.split('/').pop() }))
        .sort((a,b) => a.name.localeCompare(b.name));

      app.db.config.models   = supported;
      app.db.config.api_key  = key;
      // Auto-select best available model
      const preferred = ['models/gemini-2.0-flash','models/gemini-1.5-flash','models/gemini-1.5-pro'];
      if(!supported.find(m=>m.name===app.db.config.model)) {
        const pick = preferred.find(p=>supported.find(m=>m.name===p)) || supported[0]?.name || '';
        app.db.config.model = pick;
      }
      app.save();
      toast(`✅ ${supported.length} modelos disponíveis!`);
      ui.render('config');
    } catch(e) {
      if(status) status.innerHTML = `<span style="color:var(--r);font-size:12px;">❌ Erro de ligação.</span>`;
      if(btn) { btn.disabled=false; btn.innerHTML='🔄 Carregar Modelos da API'; }
    }
  },

  saveConfig() {
    const key = document.getElementById('cfg-key').value.trim();
    const sel = document.getElementById('cfg-model');
    // If key changed, wipe cached models so next use forces reload
    if(key !== app.db.config.api_key) {
      app.db.config.models = [];
    }
    app.db.config.api_key = key;
    if(sel && !sel.disabled) app.db.config.model = sel.value;
    app.save();
    toast('✅ Configurações guardadas!');
  },

  exportData() {
    const b = new Blob([JSON.stringify(app.db, null, 2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `saco_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  },

  importData() { document.getElementById('import-in').click(); },

  doImport(input) {
    const f = input.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if(!data.inventory) throw new Error();
        Object.assign(app.db, data);
        app.save();
        toast('✅ Backup importado!');
        ui.render('home');
      } catch { toast('Ficheiro inválido!'); }
    };
    r.readAsText(f);
  },

  clearAll() {
    if(!confirm('Apagar TODOS os dados? Esta ação é irreversível.')) return;
    app.db.inventory = {};
    app.db.shopping = [];
    app.save();
    toast('Dados apagados');
    ui.render('home');
  }
};

  // ── SIMULADOR ────────────────────────────────────────────────────────────
  simulate() {
    const raw  = parseFloat(document.getElementById('sim-val').value.replace(',','.'));
    const loja = (document.getElementById('sim-loja').value||'').trim().toLowerCase();
    if(!raw || isNaN(raw) || raw <= 0) return toast('Insere um valor válido!');

    const b = app.db.benefits;
    const linhas = [];
    let totalDesc = 0;

    // Fidelização ativa e relevante para a loja
    b.fidel.filter(x=>x.ativo).forEach(x=>{
      const lojaMatch = !loja || x.loja.toLowerCase()==='qualquer' || x.loja.toLowerCase().includes(loja) || loja.includes(x.loja.toLowerCase());
      if(!lojaMatch) return;
      if(x.tipo==='pct') {
        const save = raw * (Number(x.valor)/100);
        totalDesc += save;
        linhas.push({ icon:'💳', label:`${x.label} (${x.valor}%)`, save, color:'var(--p)' });
      } else {
        const pts = Math.floor(raw * Number(x.valor));
        linhas.push({ icon:'💳', label:`${x.label} → ${pts} pontos`, save: 0, color:'var(--p)', info:true });
      }
    });

    // Cashback ativo (aplica em todas as lojas)
    b.cashback.filter(x=>x.ativo).forEach(x=>{
      const save = raw * (Number(x.pct)/100);
      totalDesc += save;
      linhas.push({ icon:'💰', label:`${x.cartao} — ${x.banco} (${x.pct}%)`, save, color:'var(--g)' });
    });

    // Cupões ativos e relevantes
    b.cupoes.filter(x=>!x.used).forEach(c=>{
      const lojaMatch = !loja || c.loja.toLowerCase()==='qualquer' || c.loja.toLowerCase().includes(loja) || loja.includes(c.loja.toLowerCase());
      if(!lojaMatch) return;
      const n = parseFloat(c.valor.replace('€','').replace('%','').replace(',','.'));
      const save = c.valor.includes('%') ? raw*(n/100) : (n||0);
      totalDesc += save;
      linhas.push({ icon:'🎯', label:`${c.desc} (${c.loja})`, save, color:'var(--o)' });
    });

    const final = Math.max(0, raw - totalDesc);
    const res = document.getElementById('sim-res');

    if(!linhas.length) {
      res.innerHTML = `<div style="margin-top:14px;padding:14px;background:#f8fafc;border-radius:12px;text-align:center;color:var(--sub);font-size:13px;">Nenhum benefício ativo${loja?' para '+loja:''}. Ativa cartões ou adiciona cupões.</div>`;
      return;
    }

    res.innerHTML = `
      <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px;">
          <span style="color:var(--sub);">Valor base</span>
          <span style="font-weight:700;">${raw.toFixed(2)}€</span>
        </div>
        ${linhas.map(l=>`
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;align-items:center;">
            <span style="color:${l.color};font-weight:600;">${l.icon} ${l.label}</span>
            <span style="color:${l.color};font-weight:700;">${l.info ? '' : '−'+l.save.toFixed(2)+'€'}</span>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:2px solid var(--border);align-items:center;">
          <span style="font-weight:700;">Total a pagar</span>
          <span style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--g);">${final.toFixed(2)}€</span>
        </div>
        ${totalDesc > 0 ? `
        <div style="text-align:center;margin-top:10px;background:#ecfdf5;border-radius:12px;padding:12px;">
          <div style="font-size:14px;color:var(--g);font-weight:800;">Poupas ${totalDesc.toFixed(2)}€</div>
          <div style="font-size:12px;color:var(--g);">${((totalDesc/raw)*100).toFixed(1)}% do total</div>
        </div>` : ''}
      </div>`;
  }
};

// ── SCANNER ────────────────────────────────────────────────────────────────
const scanner = {
  photos: [],   // array of {dataUrl, blob}
  mode: 'recibo',
  stream: null,

  async start(mode) {
    this.mode = mode;
    this.photos = [];
    document.getElementById('snap-count').textContent = '0';
    document.getElementById('btn-process').disabled = true;
    document.getElementById('cam-thumbs').innerHTML = '';
    try {
      this.stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}} });
      document.getElementById('cam-video').srcObject = this.stream;
      document.getElementById('cam-overlay').classList.add('show');
    } catch(e) {
      toast('Sem acesso à câmara. Usa "Galeria" em alternativa.');
    }
  },

  stop() {
    if(this.stream) this.stream.getTracks().forEach(t=>t.stop());
    document.getElementById('cam-overlay').classList.remove('show');
  },

  snap() {
    const video = document.getElementById('cam-video');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    this.photos.push(dataUrl);
    // Thumbnail
    const img = document.createElement('img');
    img.src = dataUrl; img.className = 'cam-thumb';
    document.getElementById('cam-thumbs').appendChild(img);
    document.getElementById('snap-count').textContent = this.photos.length;
    document.getElementById('btn-process').disabled = false;
    toast('📸 Foto ' + this.photos.length);
  },

  fromFile() {
    document.getElementById('file-in').click();
  },

  handleFiles(files) {
    const arr = Array.from(files);
    Promise.all(arr.map(f=>new Promise(res=>{
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.readAsDataURL(f);
    }))).then(urls => {
      this.photos = urls;
      this.process();
    });
  },

  async process() {
    this.stop();
    const resDiv = document.getElementById('scan-result');
    if(!resDiv) { ui.go('scan', document.querySelector('[data-tab="scan"]')); return; }

    const { api_key, model } = app.db.config;
    if(!api_key) { toast('Configura a API Key! ⚙️'); return; }
    if(!this.photos.length) { toast('Sem fotos para processar!'); return; }

    resDiv.innerHTML = `<div class="card" style="text-align:center;padding:24px;"><div class="spin" style="border-top-color:var(--p);width:28px;height:28px;border-width:4px;margin:0 auto 14px;"></div><p style="color:var(--sub);">🤖 IA a analisar ${this.photos.length} imagem(ns)...</p></div>`;

    const isRecibo = this.mode === 'recibo';
    const prompt = isRecibo
      ? `Analisa este talão/recibo de supermercado português.
Extrai TODOS os produtos comprados.
Responde APENAS em JSON válido, sem markdown:
{"tipo":"recibo","data":"DD/MM/AAAA ou null","loja":"nome ou null","total":"X.XX€ ou null","produtos":[{"nome":"nome produto","qtd":1,"preco_unit":"X.XX€","categoria":"Laticínios/Carnes/Frutas/Legumes/Padaria/Bebidas/Limpeza/Higiene/Secos/Outros"}]}`
      : `Analisa esta imagem de despensa/frigorífico.
Identifica TODOS os produtos visíveis.
Responde APENAS em JSON válido, sem markdown:
{"tipo":"despensa","produtos":[{"nome":"nome produto","qtd_estimada":1,"categoria":"Laticínios/Carnes/Frutas/Legumes/Padaria/Bebidas/Limpeza/Higiene/Secos/Outros"}]}`;

    // Build parts with all photos
    const parts = this.photos.map(dataUrl => ({
      inline_data: { mime_type: 'image/jpeg', data: dataUrl.split(',')[1] }
    }));
    parts.push({ text: prompt });

    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${api_key}`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts}], generationConfig:{temperature:0.1} })
      });
      const d = await r.json();
      if(d.error) { resDiv.innerHTML=`<div class="card" style="color:var(--r);">Erro: ${d.error.message}</div>`; return; }

      const raw = d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
      const obj = JSON.parse(raw);
      const prods = obj.produtos || [];

      if(!prods.length) {
        resDiv.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">🤔</div><p>Não consegui identificar produtos. Tenta com melhor iluminação.</p></div></div>`;
        return;
      }

      resDiv.innerHTML = `
        <div class="card">
          <div class="sec-title">${isRecibo?'🧾 Talão':'❄️ Despensa'} — ${prods.length} produto(s) <small>${obj.loja||''} ${obj.data||''}</small></div>
          ${obj.total ? `<div style="font-size:13px;color:var(--sub);margin-bottom:12px;">Total: <b style="color:var(--txt)">${obj.total}</b></div>` : ''}
          <div id="prod-list">
            ${prods.map((p,i)=>`
              <div class="inv-item">
                <div>
                  <div class="inv-name">${p.nome}</div>
                  <div class="inv-meta">${p.categoria||'Geral'} · ${isRecibo?p.preco_unit||'':''}</div>
                </div>
                <div class="inv-actions">
                  <input type="number" value="${p.qtd||p.qtd_estimada||1}" min="0" style="width:52px;padding:6px;margin:0;font-size:14px;" id="pq-${i}">
                </div>
              </div>`).join('')}
          </div>
          <button class="btn btn-g" onclick="scanner.saveAll(${JSON.stringify(prods).replace(/"/g,'&quot;')})">✅ Adicionar Tudo à Despensa</button>
          <button class="btn btn-o" style="margin-top:8px;" onclick="scanner.saveAsShop(${JSON.stringify(prods).replace(/"/g,'&quot;')})">🛒 Adicionar à Lista de Compras</button>
        </div>`;
    } catch(e) {
      resDiv.innerHTML = `<div class="card" style="color:var(--r);">Erro ao interpretar a resposta da IA. Tenta novamente.</div>`;
      console.error(e);
    }
  },

  saveAll(prods) {
    prods.forEach((p,i) => {
      const qtyInput = document.getElementById('pq-'+i);
      const qty = qtyInput ? parseInt(qtyInput.value)||1 : (p.qtd||p.qtd_estimada||1);
      const id = app.nextId();
      // Merge if exists
      const existing = Object.values(app.db.inventory).find(x=>x.name.toLowerCase()===p.nome.toLowerCase());
      if(existing) { existing.qty += qty; existing.updated = new Date().toLocaleDateString('pt-PT'); }
      else app.db.inventory[id] = { id, name: p.nome, cat: p.categoria||'Geral', qty, updated: new Date().toLocaleDateString('pt-PT') };
    });
    app.save();
    toast(`✅ ${prods.length} produtos adicionados à despensa!`);
    ui.go('home', document.querySelector('[data-tab="home"]'));
  },

  saveAsShop(prods) {
    prods.forEach(p => logic.addToShop(p.nome));
    app.save();
    toast(`🛒 ${prods.length} itens na lista!`);
    ui.go('home', document.querySelector('[data-tab="home"]'));
    setTimeout(()=>ui.showTab('shop'),50);
  }
};

// ── SCREENSCAN — Analisa screenshots de apps de supermercados ───────────────
const screenscan = {

  open() {
    modal.show(`
      <div class="modal-title">📸 Scan da App do Supermercado</div>
      <p style="font-size:13px;color:var(--sub);margin-bottom:14px;line-height:1.5;">
        Abre a app do teu supermercado (Continente, Pingo Doce, Lidl…), faz screenshot ao ecrã de promoções ou do teu cartão, e partilha aqui. A IA extrai tudo automaticamente.
      </p>
      <div id="ss-drop" onclick="document.getElementById('ss-file').click()"
        style="border:2px dashed var(--border);border-radius:16px;padding:28px;text-align:center;cursor:pointer;background:#f8fafc;transition:border-color .2s;"
        ondragover="event.preventDefault();this.style.borderColor='var(--p)'"
        ondragleave="this.style.borderColor='var(--border)'"
        ondrop="screenscan.handleDrop(event)">
        <div style="font-size:36px;margin-bottom:8px;">📱</div>
        <div style="font-weight:700;font-size:14px;">Toca para escolher screenshot</div>
        <div style="font-size:12px;color:var(--sub);margin-top:4px;">JPG, PNG — da galeria ou câmara</div>
      </div>
      <input type="file" id="ss-file" accept="image/*" style="display:none" onchange="screenscan.handleFile(this)">
      <div id="ss-preview" style="margin-top:12px;"></div>
      <div id="ss-result" style="margin-top:10px;"></div>
    `);
  },

  handleDrop(e) {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if(f) this.processFile(f);
  },

  handleFile(input) {
    const f = input.files[0];
    if(f) this.processFile(f);
  },

  processFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      // Preview
      document.getElementById('ss-preview').innerHTML = `
        <img src="${dataUrl}" style="width:100%;border-radius:12px;max-height:220px;object-fit:contain;background:#000;">`;
      document.getElementById('ss-result').innerHTML = `
        <div style="text-align:center;padding:16px;color:var(--sub);">
          <div class="spin" style="border-top-color:var(--p);width:24px;height:24px;border-width:3px;margin:0 auto 10px;"></div>
          🤖 IA a analisar a screenshot…
        </div>`;
      this.analyze(dataUrl);
    };
    reader.readAsDataURL(file);
  },

  async analyze(dataUrl) {
    const { api_key, model } = app.db.config;
    if(!api_key) {
      document.getElementById('ss-result').innerHTML = `<div style="color:var(--r);font-size:13px;padding:10px;">Configura a API Key em ⚙️ Config primeiro.</div>`;
      return;
    }

    const prompt = `Analisa esta screenshot de uma app de supermercado português.
Extrai TODOS os benefícios de cartão de fidelização visíveis (pontos acumulados, descontos, cashback, nível do cartão) E todas as promoções/ofertas visíveis.

Responde APENAS em JSON válido sem markdown:
{
  "loja": "nome da loja/app detectada",
  "beneficios": [
    {
      "tipo": "fidel" ou "cashback" ou "cupao",
      "label": "nome do benefício",
      "loja": "nome da loja",
      "subtipo": "pct" ou "pontos",
      "valor": número,
      "extra": "info adicional (ex: pontos acumulados, nível do cartão)"
    }
  ],
  "promos": [
    {
      "title": "nome do produto",
      "store": "loja",
      "pct": "-XX%",
      "cat": "categoria com emoji (🌾 Secos / 🥛 Laticínios / 🍗 Carnes / 🍎 Frutas / 🫒 Óleos / 🧼 Limpeza / 🐟 Peixe / 🎁 Outros)",
      "badge": "on" ou "soon"
    }
  ]
}
Se não encontrares benefícios, devolve "beneficios": [].
Se não encontrares promos, devolve "promos": [].`;

    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${api_key}`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          contents: [{ parts: [
            { inline_data: { mime_type: 'image/jpeg', data: dataUrl.split(',')[1] } },
            { text: prompt }
          ]}],
          generationConfig: { temperature: 0.1 }
        })
      });
      const d = await r.json();
      if(d.error) { document.getElementById('ss-result').innerHTML=`<div style="color:var(--r);font-size:13px;padding:10px;">Erro: ${d.error.message}</div>`; return; }

      const raw = d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
      const obj = JSON.parse(raw);

      const bens   = obj.beneficios || [];
      const promos = obj.promos     || [];
      const loja   = obj.loja       || 'Supermercado';

      if(!bens.length && !promos.length) {
        document.getElementById('ss-result').innerHTML = `
          <div style="text-align:center;padding:16px;color:var(--sub);font-size:13px;">
            🤔 Não encontrei benefícios nem promoções nesta imagem.<br>
            <small>Tenta uma screenshot mais clara do ecrã de promoções ou do cartão.</small>
          </div>`;
        return;
      }

      let html = `<div style="font-weight:700;font-size:14px;margin-bottom:12px;">📱 ${loja} — O que encontrei:</div>`;

      if(bens.length) {
        html += `<div style="font-weight:700;font-size:13px;color:var(--p);margin-bottom:8px;">💳 ${bens.length} Benefício(s)</div>`;
        html += bens.map(b=>`
          <div style="background:#f0f7ff;border-radius:10px;padding:10px;margin-bottom:6px;font-size:13px;">
            <b>${b.label}</b><br>
            <span style="color:var(--sub);">${b.subtipo==='pct'?b.valor+'% desconto':b.valor+' pontos/€'}</span>
            ${b.extra ? `<br><span style="color:var(--sub);font-size:11px;">${b.extra}</span>` : ''}
          </div>`).join('');
      }

      if(promos.length) {
        html += `<div style="font-weight:700;font-size:13px;color:var(--g);margin:10px 0 8px;">🏷️ ${promos.length} Promoção(ões)</div>`;
        html += promos.map(p=>`
          <div style="background:#f0fdf4;border-radius:10px;padding:10px;margin-bottom:6px;font-size:13px;display:flex;justify-content:space-between;align-items:center;">
            <div><b>${p.title}</b><br><span style="color:var(--sub);font-size:11px;">${p.store} · ${p.cat}</span></div>
            <span style="font-family:'Syne',sans-serif;font-weight:900;color:var(--r);font-size:16px;">${p.pct}</span>
          </div>`).join('');
      }

      html += `
        <button class="btn btn-g" onclick="screenscan.saveAll(${JSON.stringify({bens,promos}).replace(/"/g,'&quot;')})">
          ✅ Guardar Tudo (${bens.length} benef. + ${promos.length} promos)
        </button>
        <button class="btn btn-ghost" style="margin-top:6px;" onclick="modal.hide()">Cancelar</button>`;

      document.getElementById('ss-result').innerHTML = html;

    } catch(e) {
      document.getElementById('ss-result').innerHTML = `<div style="color:var(--r);font-size:13px;padding:10px;">Erro ao interpretar. Tenta novamente.</div>`;
      console.error(e);
    }
  },

  saveAll({bens, promos}) {
    const hoje = new Date().toLocaleDateString('pt-PT');
    let nBen = 0, nPro = 0;

    bens.forEach(b => {
      if(b.tipo === 'fidel') {
        // Evita duplicados pelo label+loja
        const exists = app.db.benefits.fidel.find(x => x.label.toLowerCase() === b.label.toLowerCase());
        if(!exists) {
          app.db.benefits.fidel.push({ id: app.nextId(), label: b.label, loja: b.loja||'Qualquer', tipo: b.subtipo||'pct', valor: b.valor||0, ativo: true });
          nBen++;
        }
      } else if(b.tipo === 'cashback') {
        const exists = app.db.benefits.cashback.find(x => x.cartao.toLowerCase() === b.label.toLowerCase());
        if(!exists) {
          app.db.benefits.cashback.push({ id: app.nextId(), cartao: b.label, banco: b.loja||'', pct: b.valor||0, ativo: true });
          nBen++;
        }
      } else if(b.tipo === 'cupao') {
        app.db.benefits.cupoes.push({ id: app.nextId(), desc: b.label, loja: b.loja||'Qualquer', valor: b.valor+'€', validade: 'ver app', used: false });
        nBen++;
      }
    });

    promos.forEach(p => {
      const exists = app.db.promos.find(x => x.title.toLowerCase() === p.title.toLowerCase() && x.store === p.store);
      if(!exists) {
        app.db.promos.push({ id: app.nextId(), store: p.store, title: p.title, pct: p.pct, cat: p.cat, badge: p.badge||'on', data: hoje });
        nPro++;
      }
    });

    app.save();
    modal.hide();
    toast(`✅ ${nBen} benefício(s) e ${nPro} promo(s) guardados!`);
    ui.render('benefits');
  },

  delPromo(id) {
    app.db.promos = app.db.promos.filter(p => p.id !== id);
    app.save();
    ui.render('promos');
  }
};

// ── BOOT ───────────────────────────────────────────────────────────────────
ui.render('home');
</script>
</body>
</html>
