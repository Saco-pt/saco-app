<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V15.0 Claude Only</title>
    <style>
        :root {
            --blue: #5436DA;
            --success: #1a8a4a;
            --bg: #f0eefc;
            --card: #ffffff;
            --text: #1a1a2e;
            --muted: #888;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            margin: 0; padding: 16px;
            color: var(--text);
        }
        .container { max-width: 460px; margin: 0 auto; }

        .header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .header h1 { color: var(--blue); font-size: 26px; margin: 0; letter-spacing: -0.5px; }
        .version-badge {
            font-size: 10px; font-weight: 700;
            background: var(--blue); color: white;
            padding: 4px 10px; border-radius: 50px;
        }

        .card {
            background: var(--card); border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(84,54,218,0.1);
            margin-bottom: 14px;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 14px;
            border: none; font-weight: 700; cursor: pointer;
            margin-bottom: 10px; font-size: 15px;
            transition: opacity 0.15s, transform 0.1s;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .btn-cam    { background: var(--blue); color: white; }
        .btn-search { background: var(--success); color: white; }
        .btn-danger { background: #e53935; color: white; }
        .btn-ghost  { background: none; border: 1.5px solid #ddd; color: var(--muted); margin-bottom: 0; }

        input[type="text"], input[type="password"] {
            width: 100%; padding: 14px 16px;
            border: 1.5px solid #e0e0e0; border-radius: 14px;
            margin-bottom: 10px; font-size: 15px;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--blue); }

        #ia-output {
            background: var(--card); border-radius: 20px;
            padding: 18px; display: none;
            box-shadow: 0 4px 20px rgba(84,54,218,0.08);
            font-size: 14px; line-height: 1.7;
        }

        .price-item {
            display: flex; justify-content: space-between;
            align-items: center; padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .price-item:last-of-type { border-bottom: none; }
        .price-loja { font-weight: 600; }
        .price-val  { color: var(--blue); font-weight: 700; font-size: 15px; }
        .disclaimer { font-size: 11px; color: var(--muted); margin-top: 10px; text-align: center; }

        #config-panel {
            display: none; position: fixed; inset: 0;
            background: white; z-index: 9999;
            padding: 40px 20px 30px; overflow-y: auto;
        }
        .config-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 24px;
        }
        .config-header h2 { margin: 0; font-size: 20px; }
        .close-btn {
            background: #f0f0f0; border: none; font-size: 18px;
            cursor: pointer; border-radius: 50%; width: 36px; height: 36px;
        }
        label {
            font-size: 12px; font-weight: 600; color: var(--muted);
            display: block; margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .info-box {
            background: #f0eefc; border-radius: 12px;
            padding: 14px; font-size: 12px; color: #555;
            margin-top: 16px; line-height: 1.6;
        }
        .info-box a { color: var(--blue); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin 0.9s linear infinite; }

        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%);
            background: #222; color: white;
            padding: 10px 22px; border-radius: 50px;
            font-size: 14px; z-index: 99999;
            pointer-events: none;
            animation: fadeInOut 2.6s forwards;
        }
        @keyframes fadeInOut {
            0%   { opacity:0; transform:translateX(-50%) translateY(10px); }
            15%  { opacity:1; transform:translateX(-50%) translateY(0); }
            80%  { opacity:1; }
            100% { opacity:0; }
        }

        .error-msg { color: #e53935; }
        .section-title {
            font-weight: 700; font-size: 13px; color: var(--muted);
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛒 SACO.pt</h1>
        <span class="version-badge">V15 · CLAUDE ONLY</span>
    </div>

    <div class="card">
        <button class="btn btn-cam" id="cam-btn" onclick="document.getElementById('file-input').click()">
            📸 Tirar Foto / Carregar Imagem
        </button>
        <input type="file" id="file-input" style="display:none"
               accept="image/*" capture="environment" onchange="handleImage(event)">

        <input type="text" id="product-input" placeholder="Ou escreve o nome do produto...">

        <button class="btn btn-search" id="search-btn" onclick="runSearch()">
            🔍 Ver Preços
        </button>

        <button class="btn btn-ghost" onclick="toggleConfig()">
            ⚙️ Configurar API Key
        </button>
    </div>

    <div id="ia-output"></div>
</div>

<!-- Painel configurações -->
<div id="config-panel">
    <div class="config-header">
        <h2>⚙️ Definições</h2>
        <button class="close-btn" onclick="closeConfig()">✕</button>
    </div>

    <label>Claude API Key</label>
    <input type="password" id="claude-key" placeholder="sk-ant-...">

    <button class="btn btn-cam" onclick="saveConfig()">💾 Guardar</button>
    <button class="btn btn-danger" onclick="clearConfig()">🗑️ Apagar Key</button>

    <div class="info-box">
        🔐 A key é guardada apenas neste dispositivo.<br><br>
        Obter key em:<br>
        👉 <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br><br>
        ℹ️ A pesquisa de preços usa o <b>web search nativo do Claude</b> — não precisas de nenhuma outra API.
    </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────
function toggleConfig() {
    document.getElementById('config-panel').style.display = 'block';
    if (localStorage.getItem('claude_key'))
        document.getElementById('claude-key').placeholder = '(guardada) sk-ant-...';
}
function closeConfig() { document.getElementById('config-panel').style.display = 'none'; }

function saveConfig() {
    const val = document.getElementById('claude-key').value.trim();
    if (!val) { showToast('⚠️ Introduz uma key'); return; }
    if (!val.startsWith('sk-ant-')) { showToast('⚠️ Key inválida (deve começar com sk-ant-)'); return; }
    localStorage.setItem('claude_key', val);
    closeConfig();
    showToast('✅ Key guardada!');
}
function clearConfig() {
    if (!confirm('Apagar a Claude API Key?')) return;
    localStorage.removeItem('claude_key');
    document.getElementById('claude-key').value = '';
    document.getElementById('claude-key').placeholder = 'sk-ant-...';
    closeConfig();
    showToast('🗑️ Key apagada.');
}
function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2700);
}

// ── UI helpers ──────────────────────────────────────────────────────
function setLoading(on) {
    document.getElementById('cam-btn').disabled = on;
    document.getElementById('search-btn').disabled = on;
}
function showOutput(html) {
    const el = document.getElementById('ia-output');
    el.style.display = 'block';
    el.innerHTML = html;
}
function getKey() { return localStorage.getItem('claude_key'); }
function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Claude API ──────────────────────────────────────────────────────
async function callClaude(body) {
    const key = getKey();
    if (!key) throw new Error('KEY_MISSING');
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({ model: 'claude-sonnet-4-5', ...body })
    });
    if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }
    return resp.json();
}

// Extrai texto dos blocos de conteúdo
function extractText(data) {
    return (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text).join('\n').trim();
}

// ── Leitura de imagem ───────────────────────────────────────────────
function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onerror = () => reject(new Error('Erro ao ler ficheiro'));
        r.onload = () => {
            const raw = r.result;
            resolve({
                mimeType: raw.split(';')[0].split(':')[1] || 'image/jpeg',
                base64: raw.split(',')[1]
            });
        };
        r.readAsDataURL(file);
    });
}

// ── Foto → identificar produto ──────────────────────────────────────
async function handleImage(event) {
    const file = event.target.files[0];
    event.target.value = '';
    if (!file) return;
    if (!getKey()) { alert('⚠️ Falta a Claude API Key! Vai a ⚙️ Configurar API Key.'); return; }

    setLoading(true);
    showOutput('<span class="spin">⌛</span> A identificar produto...');

    try {
        const { base64, mimeType } = await readFileAsBase64(file);

        const data = await callClaude({
            max_tokens: 80,
            messages: [{
                role: 'user',
                content: [
                    { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
                    { type: 'text', text: 'Identifica este produto de supermercado: marca e nome completo. Responde APENAS com o nome, sem mais texto.' }
                ]
            }]
        });

        const name = data.content[0]?.text?.trim();
        if (!name) throw new Error('Produto não identificado.');

        document.getElementById('product-input').value = name;
        showOutput(`✅ Identificado: <b>${escapeHtml(name)}</b><br><span class="spin">🔍</span> A pesquisar preços...`);
        await runSearch();

    } catch (e) {
        handleError(e, 'Identificação');
    } finally {
        setLoading(false);
    }
}

// ── Pesquisa de preços com web_search nativo do Claude ──────────────
async function runSearch() {
    const q = document.getElementById('product-input').value.trim();
    if (!q) { alert('⚠️ Escreve ou fotografa um produto primeiro.'); return; }
    if (!getKey()) { alert('⚠️ Falta a Claude API Key! Vai a ⚙️ Configurar API Key.'); return; }

    setLoading(true);
    showOutput('<span class="spin">🌐</span> A pesquisar preços nos supermercados...');

    const WEB_SEARCH_TOOL = { type: 'web_search_20250305', name: 'web_search' };

    const SYSTEM = `És um assistente de comparação de preços em supermercados portugueses.
Usa sempre web_search para pesquisar preços actuais.
Pesquisa no Continente, Pingo Doce, Auchan, Lidl e Intermarché.
Responde APENAS em HTML com este formato para cada loja com preço encontrado:
<div class="price-item"><span class="price-loja">🏪 NOME_LOJA</span><span class="price-val">X,XX €</span></div>
Ordena do mais barato ao mais caro. Omite lojas sem preço disponível.
No final acrescenta sempre:
<p class="disclaimer">⚠️ Preços indicativos. Confirma no site oficial da loja.</p>
Não escrevas nenhum texto fora do HTML.`;

    try {
        // Primeira chamada — Claude faz o web search
        const res1 = await callClaude({
            max_tokens: 1024,
            system: SYSTEM,
            tools: [WEB_SEARCH_TOOL],
            messages: [{
                role: 'user',
                content: `Pesquisa o preço actual de "${q}" nos supermercados portugueses (Continente, Pingo Doce, Auchan, Lidl, Intermarché).`
            }]
        });

        let html = '';

        if (res1.stop_reason === 'tool_use') {
            // Claude usou o web search — segunda chamada para obter resposta final
            const toolResults = res1.content
                .filter(b => b.type === 'tool_use')
                .map(b => ({ type: 'tool_result', tool_use_id: b.id, content: '' }));

            const res2 = await callClaude({
                max_tokens: 1024,
                system: SYSTEM,
                tools: [WEB_SEARCH_TOOL],
                messages: [
                    { role: 'user', content: `Pesquisa o preço actual de "${q}" nos supermercados portugueses (Continente, Pingo Doce, Auchan, Lidl, Intermarché).` },
                    { role: 'assistant', content: res1.content },
                    { role: 'user', content: toolResults }
                ]
            });
            html = extractText(res2);
        } else {
            html = extractText(res1);
        }

        if (!html) {
            html = `<span class="error-msg">⚠️ Sem resultados para "<b>${escapeHtml(q)}</b>".<br>Tenta um nome mais específico.</span>`;
        }

        showOutput(`<div class="section-title">💰 Preços — ${escapeHtml(q)}</div>${html}`);

    } catch (e) {
        handleError(e, 'Pesquisa');
    } finally {
        setLoading(false);
    }
}

// ── Erros ───────────────────────────────────────────────────────────
function handleError(e, ctx) {
    if (e.message === 'KEY_MISSING') {
        showOutput(`<span class="error-msg">⚠️ Sem API Key. Vai a ⚙️ <b>Configurar API Key</b>.</span>`);
    } else if (e.message.includes('401')) {
        showOutput(`<span class="error-msg">❌ API Key inválida ou expirada.<br>Verifica em <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>.</span>`);
    } else if (e.message.includes('429')) {
        showOutput(`<span class="error-msg">⏳ Limite de pedidos atingido. Aguarda e tenta de novo.</span>`);
    } else {
        showOutput(`<span class="error-msg">❌ Erro (${ctx}): ${escapeHtml(e.message)}</span>`);
    }
}
</script>
</body>
</html>
