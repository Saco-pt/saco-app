<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACO.pt | Scanner & IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --blue: #007aff; --green: #34c759; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: var(--blue); text-align: center; font-size: 22px; }
        
        /* Estilo do Scanner */
        #interactive.viewport { position: relative; width: 100%; height: 200px; overflow: hidden; border-radius: 15px; background: #000; display: none; margin-bottom: 15px; }
        #interactive.viewport video { width: 100%; }
        canvas.drawingBuffer { position: absolute; left: 0; top: 0; }

        .input-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #eee; border-radius: 10px; outline: none; }
        .btn-icon { background: #eee; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 18px; }
        
        .item { background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 4px solid var(--blue); }
        .compare-btn { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #res { margin-top: 20px; padding: 15px; background: #eef9f1; border-radius: 12px; display: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="app">
    <h1>🛒 SACO.pt Scanner</h1>

    <!-- Área da Câmara -->
    <div id="interactive" class="viewport"></div>
    
    <div class="input-box">
        <input type="text" id="p-input" placeholder="Produto ou Scaneia...">
        <button class="btn-icon" onclick="startScanner()">📷</button>
        <button class="add-btn" style="background:var(--blue); color:white; border:none; border-radius:10px; padding:0 15px;" onclick="add()">+</button>
    </div>

    <div id="lista"></div>

    <button id="btn" class="compare-btn" onclick="analisar()">COMPARAR PREÇOS (GROQ)</button>
    
    <div id="res"></div>

    <p style="text-align:center; font-size:10px; color:#ccc; margin-top:20px; cursor:pointer;" onclick="localStorage.clear(); location.reload();">Resetar Chave</p>
</div>

<script>
    let items = [];

    // --- FUNÇÃO DO SCANNER ---
    function startScanner() {
        const viewer = document.getElementById('interactive');
        viewer.style.display = "block";

        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: viewer, constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, function(err) {
            if (err) { alert("Erro na câmara: " + err); return; }
            Quagga.start();
        });

        Quagga.onDetected(async (data) => {
            const code = data.codeResult.code;
            Quagga.stop();
            viewer.style.display = "none";
            
            // Consultar nome do produto via API gratuita
            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                const json = await res.json();
                const nome = json.status === 1 ? json.product.product_name : "Produto Desconhecido (" + code + ")";
                items.push(nome);
                render();
            } catch (e) {
                items.push("Código: " + code);
                render();
            }
        });
    }

    // --- FUNÇÕES BASE ---
    function add() {
        const input = document.getElementById('p-input');
        if (!input.value.trim()) return;
        items.push(input.value.trim());
        render();
        input.value = '';
    }

    function render() {
        document.getElementById('lista').innerHTML = items.map((it, i) => `
            <div class="item"><span>${it}</span><span style="color:red;cursor:pointer" onclick="items.splice(${i},1);render()">✕</span></div>
        `).join('');
    }

    async function analisar() {
        let key = localStorage.getItem('groq_key');
        if (!key) {
            key = prompt("Chave Groq:");
            if (key) localStorage.setItem('groq_key', key);
        }

        const resDiv = document.getElementById('res');
        resDiv.style.display = "block";
        resDiv.innerHTML = "⚡ Analisando...";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: `Preços Portugal (Lidl, Pingo Doce, Continente) para: ${items.join(', ')}. Onde é mais barato?` }]
                })
            });
            const data = await response.json();
            resDiv.innerHTML = "<b>Sugestão:</b><br>" + data.choices[0].message.content.replace(/\n/g, '<br>');
        } catch (e) { alert("Erro na IA"); }
    }
</script>

</body>
</html>
