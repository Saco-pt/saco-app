<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V20 BRANDS</title>
    <style>
        :root { --blue: #4285f4; --green: #1a8a4a; --bg: #f8f9fa; --card: #fff; --grey: #5f6368; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 90px; color: #202124; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; height: 75px; box-shadow: 0 -2px 15px rgba(0,0,0,0.08); z-index: 1000; border-top: 1px solid #eee; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--grey); cursor: pointer; }
        .nav-item.active { color: var(--blue); }
        .nav-item span { font-size: 22px; margin-bottom: 4px; }

        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); }
        
        .btn { border: none; border-radius: 16px; padding: 16px; font-weight: 700; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }

        /* Estilo para a Escolha de Marca */
        .brand-selector { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .brand-opt { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .brand-opt.active { background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); color: var(--blue); }

        .counter-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: #f1f3f4; padding: 12px 18px; border-radius: 15px; }
        .counter-controls { display: flex; align-items: center; gap: 15px; }
        .c-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        textarea { width: 100%; height: 180px; border: 2px solid #eee; border-radius: 18px; padding: 15px; font-size: 14px; resize: none; outline: none; margin-bottom: 12px; background: #fafafa; }
        .spin { animation: rotate 1s linear infinite; display: inline-block; }
        @keyframes rotate { from { rotate: 0deg; } to { rotate: 360deg; } }
    </style>
</head>
<body>

<div id="view-home" class="view active">
    <h1 style="color:var(--blue); margin-bottom:20px;">🛒 SACO.pt</h1>
    <div class="card">
        <button class="btn btn-blue" onclick="document.getElementById('i-cam').click()"><span>📸</span> Analisar Produto</button>
        <input type="file" id="i-cam" style="display:none" accept="image/*" capture="environment" onchange="processMedia(this)">
        <input type="text" id="q-home" placeholder="Pesquisa rápida..." style="width:100%; padding:15px; border:2px solid #eee; border-radius:12px; margin-top:15px; outline:none;">
        <button class="btn btn-green" style="margin-top:10px" onclick="runSingleSearch()">Comparar Preço</button>
    </div>
    <div id="out-home"></div>
</div>

<div id="view-gen" class="view">
    <h2>🧬 Gerador de Lista</h2>
    <div class="card">
        <p style="font-size:13px; color:var(--grey); margin-bottom:10px;">Preferência de Marca:</p>
        <div class="brand-selector" id="brand-type">
            <div class="brand-opt active" onclick="setBrand('low', this)">💎 Marca Branca (Poupança)</div>
            <div class="brand-opt" onclick="setBrand('top', this)">🏷️ Marcas Conhecidas</div>
        </div>

        <div class="counter-group">
            <span>👨 Adultos</span>
            <div class="counter-controls">
                <button class="c-btn" onclick="updateCount('adults', -1)">-</button>
                <b id="count-adults">2</b>
                <button class="c-btn" onclick="updateCount('adults', 1)">+</button>
            </div>
        </div>

        <div class="counter-group">
            <span>👶 Crianças</span>
            <div class="counter-controls">
                <button class="c-btn" onclick="updateCount('kids', -1)">-</button>
                <b id="count-kids">1</b>
                <button class="c-btn" onclick="updateCount('kids', 1)">+</button>
            </div>
        </div>

        <button class="btn btn-blue" onclick="generateList()">✨ Gerar Sugestão Mensal</button>
    </div>
    <div id="out-gen"></div>
</div>

<div id="view-list" class="view">
    <h2>📝 Meu Carrinho</h2>
    <div class="card">
        <textarea id="list-input" placeholder="Lista de produtos..."></textarea>
        <button class="btn btn-green" onclick="compareFullList()">🔍 Comparar Carrinho Total</button>
    </div>
    <div id="out-list"></div>
</div>

<div id="view-config" class="view">
    <h2>⚙️ Configuração</h2>
    <div class="card">
        <input type="password" id="key-input" placeholder="Gemini API Key..." style="width:100%; padding:15px; border:2px solid #eee; border-radius:12px; margin-bottom:15px;">
        <button class="btn btn-blue" onclick="saveKey()">Guardar Chave</button>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchView('home', this)"><span>🏠</span>Início</div>
    <div class="nav-item" onclick="switchView('gen', this)"><span>✨</span>Gerador</div>
    <div class="nav-item" onclick="switchView('list', this)"><span>📝</span>Lista</div>
    <div class="nav-item" onclick="switchView('config', this)"><span>⚙️</span>Config</div>
</nav>

<script>
const MODEL = "gemini-2.5-flash";
let counts = { adults: 2, kids: 1 };
let brandPreference = 'low';

function switchView(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    el.classList.add('active');
}

function setBrand(type, el) {
    brandPreference = type;
    document.querySelectorAll('.brand-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
}

function updateCount(type, val) {
    counts[type] = Math.max(0, counts[type] + val);
    document.getElementById('count-' + type).innerText = counts[type];
}

async function callAI(payload) {
    const key = localStorage.getItem('saco_key');
    if(!key) { alert("Configura a API Key!"); return; }
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    const d = await r.json();
    return d.candidates[0].content.parts[0].text;
}

async function generateList() {
    const out = document.getElementById('out-gen');
    out.innerHTML = '<div class="card" style="text-align:center"><span class="spin">⌛</span> Gerando lista personalizada...</div>';
    
    const brandContext = brandPreference === 'low' 
        ? "Dá prioridade absoluta a marcas próprias de supermercado (É, Pingo Doce, Auchan, Lidl)." 
        : "Sugere marcas nacionais conhecidas em Portugal (ex: Mimosa, Terra Nostra, Fairy, Colgate).";

    try {
        const prompt = `Cria uma lista de compras mensal essencial para ${counts.adults} adultos e ${counts.kids} crianças em Portugal. 
        ${brandContext} 
        Responde APENAS com a lista de produtos, um por linha.`;
        
        const res = await callAI({ contents: [{ parts: [{ text: prompt }] }] });
        out.innerHTML = `<div class="card"><h3>Lista Sugerida:</h3><div style="font-size:13px; max-height:150px; overflow:auto; margin-bottom:15px;">${res.replace(/\n/g, '<br>')}</div><button class="btn btn-green" onclick="transferList(\`${res.replace(/`/g, "'")}\`)">Usar esta Lista</button></div>`;
    } catch(e) { out.innerHTML = "Erro."; }
}

function transferList(text) {
    document.getElementById('list-input').value = text.trim();
    switchView('list', document.querySelectorAll('.nav-item')[2]);
}

async function compareFullList() {
    const text = document.getElementById('list-input').value.trim();
    const out = document.getElementById('out-list');
    out.innerHTML = '<div class="card" style="text-align:center"><span class="spin">⌛</span> Calculando melhor preço total...</div>';

    try {
        const res = await callAI({
            contents: [{ parts: [{ text: `Analisa: ${text}. Compara o preço total no Continente, Pingo Doce, Auchan, Lidl. Responde JSON: {"lojas":[{"nome":"Loja","total":0.00,"encontrados":0}],"vencedor":"Nome"}` }] }],
            tools: [{ google_search: {} }]
        });
        const data = JSON.parse(res.match(/\{[\s\S]*\}/)[0]);
        let html = `<div class="card"><h3>🛒 Resultado: ${data.vencedor}</h3>`;
        data.lojas.sort((a,b) => a.total - b.total).forEach(l => {
            html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0"><span><b>${l.nome}</b></span> <b>${l.total.toFixed(2)}€</b></div>`;
        });
        out.innerHTML = html + `</div>`;
    } catch(e) { out.innerHTML = "Erro na pesquisa."; }
}

function saveKey() {
    localStorage.setItem('saco_key', document.getElementById('key-input').value.trim());
    alert("Guardado!");
}
</script>
</body>
</html>
