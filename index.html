<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt V70.3 - Strategy Engine</title>
    <style>
        :root { --primary: #1e40af; --success: #059669; --warn: #d97706; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: #1e293b; }
        .container { padding: 16px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 16px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: block; margin-top: 10px; }
        .badge { font-size: 10px; padding: 4px 8px; border-radius: 20px; font-weight: bold; }
        .badge-promo { background: #dcfce7; color: #166534; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #e2e8f0; }
        .nav-item { border: none; background: none; font-size: 11px; color: #64748b; flex: 1; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    </div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="engine.render('home')">🏠 Stock</button>
    <button class="nav-item" onclick="engine.render('list')">📋 Lista Mensal</button>
    <button class="nav-item" onclick="engine.render('scan')">📸 Scan</button>
    <button class="nav-item" onclick="engine.render('wallet')">💳 Estratégia</button>
</nav>

<script>
/**
 * DB E LÓGICA PREDITIVA
 */
const engine = {
    state: JSON.parse(localStorage.getItem('saco_v70_3')) || {
        inventory: {}, // EAN/ID: { nome, qtd_atual, unit_price, burn_rate, category }
        loyalty: { continente: 0, pingo: 0, lidl: 0 },
        cashback_card: 'cetelem_black',
        history: []
    },

    save() {
        localStorage.setItem('saco_v70_3', JSON.stringify(this.state));
        this.render(this.currentTab || 'home');
    },

    // Função de IA: Processa o talão com Grounding
    processReceipt(receiptData) {
        receiptData.items.forEach(item => {
            const id = item.ean || item.clean_name;
            const existing = this.state.inventory[id] || { qtd_atual: 0, history: [] };
            
            this.state.inventory[id] = {
                ...item,
                qtd_atual: existing.qtd_atual + item.quantity,
                last_buy: new Date().toISOString(),
                price_history: [...(existing.history || []), { p: item.unit_price, d: new Date().toISOString() }]
            };
        });
        this.save();
    },

    render(tab) {
        this.currentTab = tab;
        const view = document.getElementById('app');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

        if (tab === 'home') {
            view.innerHTML = `
                <h2>Despensa Virtual 🏠</h2>
                <div class="card">
                    <h4>Stock Crítico (Acaba em < 3 dias)</h4>
                    ${this.renderStockList(true)}
                </div>
            `;
        }

        if (tab === 'list') {
            view.innerHTML = `
                <h2>Lista de Compras Mensal 📋</h2>
                <div class="card" style="border-left: 5px solid var(--success)">
                    <p><b>Estratégia:</b> Baseado no teu consumo médio e nos folhetos atuais de Alfena.</p>
                </div>
                ${this.renderMonthlySuggestion()}
                <button class="btn" onclick="engine.shareWhatsApp()">Partilhar com a Esposa 📲</button>
            `;
        }

        if (tab === 'scan') {
            view.innerHTML = `
                <h2>📸 Novo Recibo</h2>
                <div class="card">
                    <p>A IA irá identificar o EAN, Preço Unitário e quantidades automaticamente.</p>
                    <button class="btn" onclick="alert('Iniciando Scanner Multi-Foto...')">Digitalizar Talão</button>
                </div>
            `;
        }
    },

    renderStockList(onlyCritical) {
        const items = Object.values(this.state.inventory);
        if (items.length === 0) return "<p>Sem dados. Digitaliza o primeiro recibo!</p>";
        return items.map(i => `
            <div style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid #eee">
                <div><b>${i.clean_name}</b><br><small>${i.qtd_atual} un | ${i.unit_price}€/un</small></div>
                ${i.qtd_atual < 2 ? '<span class="badge" style="background:#fee2e2; color:#ef4444">Repor</span>' : ''}
            </div>
        `).join('');
    },

    renderMonthlySuggestion() {
        // Lógica Preditiva: Sugere o que costumas gastar no mês
        return `<div class="card">
            <h4>Reposição Mensal Estimada:</h4>
            <ul style="padding-left: 20px;">
                <li>Arroz (2kg) - Sugestão: Lidl</li>
                <li>Detergente (1un) - <span class="badge badge-promo">Promo no Pingo Doce</span></li>
                <li>Leite (12L) - Continente (Usar Cupão)</li>
            </ul>
        </div>`;
    },

    shareWhatsApp() {
        const txt = `🛒 *Plano Mensal de Compras*\n\nSugestão IA baseada no stock de Alfena.\nChecklist: https://saco.pt/lista`;
        window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
    }
};

// Iniciar
engine.render('home');
</script>
</body>
</html>
