<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACO.pt - Scanner de Erros</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #f8f9fc; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn { width: 100%; background: #007aff; color: white; border: none; padding: 20px; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .log-box { margin-top: 20px; background: #1a1c22; color: #00ff00; padding: 15px; border-radius: 15px; font-family: monospace; font-size: 12px; overflow-x: auto; white-space: pre-wrap; min-height: 200px; }
        .label { color: #666; font-size: 14px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div style="font-size: 28px; font-weight: 800; color: #007aff; margin-bottom: 20px; text-align: center;">SACO.pt</div>

    <div class="card">
        <span class="label">Este teste vai listar os modelos disponíveis para a tua chave:</span>
        <button id="btnScan" class="btn" onclick="scanModels()">SCANNER DE MODELOS</button>
        
        <div id="console" class="log-box">Aguardando início...</div>
    </div>

    <script>
        const KEY = "AIzaSyBEeOFiu49Lk1CTxCsblRjjNRaDftnJHhM";
        const logArea = document.getElementById('console');

        async function scanModels() {
            logArea.innerHTML = "A ligar à Google API...\n";
            document.getElementById('btnScan').disabled = true;

            try {
                // Tentamos listar todos os modelos disponíveis para esta chave
                const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${KEY}`;
                
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    logArea.innerHTML += `❌ ERRO DA CHAVE:\n${JSON.stringify(data.error, null, 2)}`;
                } else {
                    logArea.innerHTML = "✅ CONECTADO! Modelos disponíveis:\n\n";
                    
                    if (data.models && data.models.length > 0) {
                        data.models.forEach(m => {
                            // Filtramos apenas os que suportam gerar conteúdo
                            if(m.supportedGenerationMethods.includes("generateContent")) {
                                logArea.innerHTML += `• ${m.name}\n`;
                            }
                        });
                    } else {
                        logArea.innerHTML += "Nenhum modelo encontrado para esta conta.";
                    }
                }
            } catch (e) {
                logArea.innerHTML += `❌ ERRO DE REDE: ${e.message}`;
            }
            
            document.getElementById('btnScan').disabled = false;
        }
    </script>
</body>
</html>
