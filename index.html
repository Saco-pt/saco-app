<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V16.3 PRO</title>
    <style>
        :root { --blue: #4285f4; --green: #1a8a4a; --bg: #f1f3f4; --card: #fff; --muted: #888; --red: #e53935; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 16px; color: #1a1a2e; }
        .container { max-width: 460px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .header h1 { color: var(--blue); font-size: 26px; margin: 0; letter-spacing: -1px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 14px; border: 1px solid rgba(0,0,0,0.05); }
        .mode-label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin: 14px 0 8px; letter-spacing: 0.5px; }
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .btn-barcode { background: #1a1a1a; color: #fff; }
        .btn-cam { background: var(--blue); color: #fff; }
        .btn-search { background: var(--green); color: #fff; box-shadow: 0 4px 10px rgba(26, 138, 74, 0.2); }
        .btn-ghost { background: none; border: 1.5px solid #ddd; color: var(--muted); margin-top: 10px; }
        input { width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; margin-bottom: 12px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--blue); }
        #output { background: var(--card); border-radius: 20px; padding: 18px; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.08); margin-top: 10px; line-height: 1.5; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { text-align: left; background: #f8f9fa; padding: 8px; border-bottom: 2px solid #eee; }
        td { padding: 10px 8px; border-bottom: 1px solid #eee; }
        .price-tag { font-weight: 800; color: var(--green); }
        #config-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; padding: 40px 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin 1s linear infinite; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛒 SACO.pt</h1>
        <span style="font-size: 10px; background: #333; color: #fff; padding: 4px 8px; border-radius: 10px; font-weight: bold;">V16.2 PRO</span>
    </div>

    <div class="card">
        <div class="mode-label">📦 Leitura Rápida</div>
        <button class="btn btn-barcode" id="btn-bar" onclick="document.getElementById('in-bar').click()">〓 Fotografar Código de Barras</button>
        <input type="file" id="in-bar" style="display:none" accept="image/*" capture="environment" onchange="processImage(this, 'barcode')">

        <button class="btn btn-cam" id="btn-cam" onclick="document.getElementById('in-cam').click()">📸 Fotografar Produto / Prateleira</button>
        <input type="file" id="in-cam" style="display:none" accept="image/*" capture="environment" onchange="processImage(this, 'photo')">

        <div style="margin: 20px 0; border-top: 1px dotted #ccc;"></div>

        <div class="mode-label">🔍 Pesquisa Manual</div>
        <input type="text" id="q" placeholder="Ex: Água Penacova 5L">
        <button class="btn btn-search" id="btn-search" onclick="runSearch()">🔍 Comparar Preços Agora</button>
        
        <button class="btn btn-ghost" onclick="toggleConfig(true)">⚙️ Configurar Gemini Key</button>
    </div>

    <div id="output"></div>
</div>

<div id="config-panel">
    <h2>⚙️ Definições API</h2>
    <p>Insere a tua API Key do Google AI Studio:</p>
    <input type="password" id="api-key" placeholder="AIza...">
    <button class="btn btn-cam" onclick="saveKey()">💾 Guardar Configuração</button>
    <button class="btn btn-ghost" onclick="toggleConfig(false)">Voltar</button>
</div>

<script>
const MODEL = "gemini-2.5-flash"; 

function toggleConfig(show) { document.getElementById('config-panel').style.display = show ? 'block' : 'none'; }
function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    if (key) { localStorage.setItem('gemini_key', key); alert("Chave configurada com sucesso!"); toggleConfig(false); }
}

function setUI(loading, message = 'A processar...') {
    const ids = ['btn-bar', 'btn-cam', 'btn-search'];
    ids.forEach(id => document.getElementById(id).disabled = loading);
    const out = document.getElementById('output');
    if (loading) { 
        out.style.display = 'block'; 
        out.innerHTML = `<div style="text-align:center; padding: 20px;"><span class="spin">⌛</span><br><br>${message}</div>`; 
    }
}

async function geminiRequest(payload) {
    const key = localStorage.getItem('gemini_key');
    if (!key) throw new Error("Chave API não encontrada! Clica em Configurar.");

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates[0].content.parts[0].text;
}

async function processImage(input, mode) {
    const file = input.files[0];
    if (!file) return;
    setUI(true, mode === 'barcode' ? 'A ler código de barras...' : 'A identificar produto...');

    try {
        const base64 = await toBase64(file);
        const prompt = mode === 'barcode' 
            ? "Lê o número EAN/código de barras. Responde APENAS o número. Se não vires, tenta identificar o nome do produto." 
            : "Identifica a marca e o nome exato deste produto de supermercado. Sê específico (ex: Água Luso 1.5L). Responde apenas o nome.";
        
        const result = await geminiRequest({
            contents: [{ parts: [
                { inline_data: { mime_type: file.type, data: base64 } },
                { text: prompt }
            ]}]
        });

        document.getElementById('q').value = result.trim();
        await runSearch();
    } catch (e) {
        document.getElementById('output').innerHTML = `<div style="color:red; padding:10px;">⚠️ Erro: ${e.message}</div>`;
    } finally {
        setUI(false);
        input.value = '';
    }
}

async function runSearch() {
    const query = document.getElementById('q').value;
    if (!query) return alert("Escreve o nome de um produto.");
    setUI(true, `A pesquisar preços reais para "${query}"...`);

    try {
        const result = await geminiRequest({
            contents: [{ 
                parts: [{ 
                    text: `Age como um comparador de preços rigoroso para Portugal.
                    Produto: "${query}".
                    Lojas obrigatórias: Continente, Pingo Doce, Auchan, Lidl.
                    
                    INSTRUÇÕES CRÍTICAS:
                    1. PESQUISA ATIVA: Usa a ferramenta Google Search para encontrar o PREÇO ATUAL (Hoje).
                    2. EXTRAÇÃO DE DADOS: Não aceito "Preço não especificado". Procura o valor numérico em folhetos, sites oficiais ou comparadores (KuantoKusta, SuperSabe).
                    3. FORMATO: Cria uma TABELA HTML. Colunas: Loja | Produto Exato | Preço | Obs (ex: Preço por Litro/Kg).
                    4. PERSISTÊNCIA: Se o preço não estiver no site principal, estima com base no folheto mais recente da semana atual.
                    5. Se for um pack (ex: 6x1.5L), indica o preço do pack e o preço unitário.
                    Responde apenas com o HTML da tabela e uma nota curta se houver promoções.` 
                }] 
            }],
            tools: [{ google_search: {} }]
        });
        document.getElementById('output').innerHTML = `<div style="font-size:16px; font-weight:bold; margin-bottom:12px; color:var(--blue);">💰 Resultados Encontrados:</div>` + result;
    } catch (e) {
        document.getElementById('output').innerHTML = `<div style="color:red; padding:10px;">⚠️ Erro na pesquisa: ${e.message}</div>`;
    } finally {
        setUI(false);
    }
}

function toBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
    });
}
</script>
</body>
</html>
