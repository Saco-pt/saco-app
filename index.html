<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V18.5 Sniper</title>
    <style>
        :root { --blue: #4285f4; --green: #34a853; --bg: #f8f9fa; --text: #202124; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--text); }
        .container { max-width: 420px; margin: 0 auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 5px; }
        .logo { font-size: 26px; font-weight: 900; color: var(--blue); margin: 0; letter-spacing: -1.5px; }
        .status { font-size: 10px; font-weight: 800; background: #e8f0fe; color: var(--blue); padding: 4px 10px; border-radius: 20px; }

        /* Main Card */
        .card { background: white; border-radius: 28px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.05); }
        
        .btn-main { 
            width: 100%; padding: 22px; border-radius: 20px; border: none; 
            background: var(--blue); color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 8px 20px rgba(66, 133, 244, 0.25); transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.97); box-shadow: none; }

        .input-group { position: relative; margin-top: 20px; }
        input { 
            width: 100%; padding: 18px; border: 2px solid #f1f3f4; border-radius: 16px; 
            font-size: 16px; outline: none; box-sizing: border-box; transition: 0.3s; background: #fdfdfd;
        }
        input:focus { border-color: var(--blue); background: #fff; }

        /* Results Area */
        #output { display: none; margin-top: 15px; animation: fadeIn 0.4s ease; }
        .result-box { background: white; border-radius: 24px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        .row { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid #f8f9fa; }
        .row:last-child { border-bottom: none; }
        .row.best { background: #e6f4ea; position: relative; }
        
        .loja { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px; }
        .preco { font-weight: 900; font-size: 18px; color: var(--blue); }
        .best .preco { color: var(--green); }
        
        .badge-best { background: var(--green); color: white; font-size: 10px; padding: 4px 10px; border-radius: 8px; font-weight: 900; letter-spacing: 0.5px; }
        
        /* Utils */
        .loader { text-align: center; padding: 40px; color: #5f6368; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--blue); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #cfg-btn { text-align: center; color: #bdc1c6; font-size: 12px; margin-top: 20px; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">SACO<span style="color:#bdc1c6">.pt</span></h1>
        <div class="status">V18.5 LIVE</div>
    </div>

    <div class="card">
        <!-- Gatilho On-The-Fly -->
        <button class="btn-main" onclick="document.getElementById('cam-trigger').click()">
            📸 TIRAR FOTO À EMBALAGEM

        <!-- Capture environment garante que abre a câmara traseira diretamente no telemóvel -->
        <input type="file" id="cam-trigger" style="display:none" accept="image/*" capture="environment" onchange="processOnTheFly(event)">
        
        <div class="input-group">
            <input type="text" id="prod-name" placeholder="Ou digita o produto aqui...">
        </div>
        
        <button class="btn-main" style="background: var(--green); padding: 16px; font-size: 14px; box-shadow: 0 4px 12px rgba(52, 168, 83, 0.2);" onclick="manualSearch()">
            🔍 PESQUISA MANUAL

        <div id="cfg-btn" onclick="setupKey()">⚙️ CONFIGURAR API KEY</div>
    </div>

    <div id="output"></div>
</div>
