<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | Scanner Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { --primary: #007aff; --success: #34c759; --dark: #1c1c1e; --bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--dark); }
        .container { max-width: 450px; margin: 0 auto; background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); position: relative; }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 26px; }
        .subtitle { text-align: center; font-size: 12px; color: #8e8e93; margin-bottom: 20px; }

        /* Scanner */
        #scanner-view { width: 100%; height: 0; overflow: hidden; transition: 0.3s; border-radius: 20px; background: #000; position: relative; }
        #scanner-view.active { height: 250px; margin-bottom: 15px; border: 3px solid var(--primary); }
        #scanner-view video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Botão Lanterna */
        #torch-btn { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); color: white; border: none; padding: 10px; border-radius: 50%; display: none; cursor: pointer; font-size: 20px; }

        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 15px; border: 1.5px solid #e5e5ea; border-radius: 15px; outline: none; font-size: 16px; }
        .btn { border: none; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-scan { background: #f2f2f7; color: var(--primary); padding: 0 15px; font-size: 22px; }
        .btn-add { background: var(--primary); color: white; padding: 0 20px; }

        .item { background: #f9f9f9; padding: 12px 18px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        
        .compare-btn { width: 100%; background: var(--success); color: white; padding: 20px; border-radius: 18px; font-size: 17px; font-weight: 800; border: none; cursor: pointer; margin-top: 10px; }

        #res { margin-top: 25px; padding: 20px; background: #fafffa; border-radius: 20px; border: 1px solid #dcf5e1; display: none; font-size: 15px; line-height: 1.6; }

        /* Configurações */
        #config-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 30px; box-sizing: border-box; }
        .close-config { float: right; font-size: 24px; font-weight: bold; cursor: pointer; }
        .config-input { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <span style="position: absolute; right: 25px; top: 25px; cursor: pointer; font-size: 20px;" onclick="toggleConfig()">⚙️</span>
    <h1>🛒 SACO.pt</h1>
    <p class="subtitle">Preços Reais com Pesquisa Google (Tavily)</p>

    <div id="scanner-view">
        <button id="torch-btn" onclick="toggleTorch()">🔦</button>
    </div>

    <div class="input-group">
        <button class="btn btn-scan" onclick="startScanner()">📷</button>
        <input type="text" id="inp" placeholder="O que vais comprar?">
        <button class="btn btn-add" onclick="add()">+</button>
    </div>

    <div id="lista"></div>
    <button class="compare-btn" id="go" onclick="procurar()">PESQUISAR PREÇOS DE HOJE</button>
    <div id="res"></div>
</div>

<div id="config-panel">
    <span class="close-config" onclick="toggleConfig()">✕</span>
    <h2>Configurações APIs</h2>
    <p style="font-size: 13px; color: #666;">Insira as suas chaves para a app funcionar:</p>
    
    <label>Groq API Key (Llama):</label>
    <input type="password" id="conf-groq" class="config-input" placeholder="gsk_...">
    
    <label>Tavily API Key (Google Search):</label>
    <input type="password" id="conf-tavily" class="config-input" placeholder="tvly-...">
    
    <button class="compare-btn" onclick="saveKeys()">GUARDAR DEFINIÇÕES</button>
    <p style="text-align:center; color:red; margin-top:20px; cursor:pointer;" onclick="localStorage.clear(); location.reload();">Limpar Tudo</p>
</div>

<script>
    let items = [];
    let track = null;

    // --- CONFIGURAÇÕES ---
    function toggleConfig() {
        const panel = document.getElementById('config-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        document.getElementById('conf-groq').value = localStorage.getItem('groq_key') || '';
        document.getElementById('conf-tavily').value = localStorage.getItem('tavily_key') || '';
    }

    function saveKeys() {
        localStorage.setItem('groq_key', document.getElementById('conf-groq').value);
        localStorage.setItem('tavily_key', document.getElementById('conf-tavily').value);
        alert("Chaves guardadas!");
        toggleConfig();
    }

    // --- SCANNER E LANTERNA ---
    function startScanner() {
        const view = document.getElementById('scanner-view');
        view.classList.add('active');
        document.getElementById('torch-btn').style.display = "block";

        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: view, constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => {
            if (err) return alert("Erro câmara");
            Quagga.start();
            // Aceder ao track para a lanterna
            setTimeout(() => {
                const video = document.querySelector('video');
                if (video && video.srcObject) {
                    track = video.srcObject.getVideoTracks()[0];
                }
            }, 1000);
        });
    }

    function toggleTorch() {
        if (track && track.getCapabilities().torch) {
            const current = track.getSettings().torch || false;
            track.applyConstraints({ advanced: [{ torch: !current }] });
        } else {
            alert("Lanterna não suportada neste browser/aparelho.");
        }
    }

    Quagga.onDetected(async (res) => {
        const code = res.codeResult.code;
        Quagga.stop();
        document.getElementById('scanner-view').classList.remove('active');
        add(code);
    });

    // --- LÓGICA ---
    function add(txt) {
        const val = txt || document.getElementById('inp').value.trim();
        if (!val) return;
        items.push(val);
        document.getElementById('lista').innerHTML = items.map((it, i) => `
            <div class="item"><span>${it}</span><span onclick="items.splice(${i},1);add('')">✕</span></div>
        `).join('');
        document.getElementById('inp').value = '';
    }

    async function procurar() {
        const groqKey = localStorage.getItem('groq_key');
        const tavilyKey = localStorage.getItem('tavily_key');
        if (!groqKey || !tavilyKey) return toggleConfig();

        const resDiv = document.getElementById('res');
        resDiv.style.display = "block";
        resDiv.innerHTML = "🌐 <b>A pesquisar folhetos no Google...</b>";

        try {
            // 1. Pesquisa Tavily
            const s = await fetch("https://api.tavily.com/search", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ api_key: tavilyKey, query: `preço hoje Portugal Continente Pingo Doce Lidl: ${items.join(', ')}`, include_answer: true })
            });
            const sData = await s.json();

            // 2. Análise Groq
            resDiv.innerHTML = "🧠 <b>A analisar preços reais...</b>";
            const g = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${groqKey}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "És o SACO.pt. Usa os dados da pesquisa para dar os preços reais de hoje nos supermercados em Portugal. Sê breve e direto." },
                               { role: "user", content: `Dados: ${sData.answer || ''} \n\n Itens: ${items.join(', ')}` }]
                })
            });
            const gData = await g.json();
            resDiv.innerHTML = "<b>✅ Resultados:</b><br><br>" + gData.choices[0].message.content.replace(/\n/g, '<br>');
        } catch (e) { resDiv.innerHTML = "❌ Erro nas APIs. Verifique as chaves."; }
    }
</script>
</body>
</html>
