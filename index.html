<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V15 Gemini Free</title>
    <style>
        :root {
            --blue: #4285f4;
            --green: #1a8a4a;
            --bg: #f1f3f4;
            --card: #fff;
            --muted: #888;
            --red: #e53935;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg); margin: 0; padding: 16px;
            color: #1a1a2e;
        }
        .container { max-width: 460px; margin: 0 auto; }

        .header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 16px;
        }
        .header h1 { color: var(--blue); font-size: 26px; margin: 0; }
        .badge {
            font-size: 10px; font-weight: 700;
            background: var(--blue); color: white;
            padding: 4px 10px; border-radius: 50px;
        }

        .card {
            background: var(--card); border-radius: 20px;
            padding: 20px; box-shadow: 0 4px 16px rgba(66,133,244,0.12);
            margin-bottom: 14px;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 14px;
            border: none; font-weight: 700; cursor: pointer;
            margin-bottom: 10px; font-size: 15px;
            transition: opacity .15s, transform .1s;
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .btn-cam    { background: var(--blue); color: #fff; }
        .btn-search { background: var(--green); color: #fff; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-ghost  {
            background: none; border: 1.5px solid #ddd;
            color: var(--muted); margin-bottom: 0;
        }

        input[type="text"], input[type="password"] {
            width: 100%; padding: 14px 16px;
            border: 1.5px solid #e0e0e0; border-radius: 14px;
            margin-bottom: 10px; font-size: 15px;
            outline: none; transition: border-color .2s;
        }
        input:focus { border-color: var(--blue); }

        #output {
            background: var(--card); border-radius: 20px;
            padding: 18px; display: none;
            box-shadow: 0 4px 16px rgba(66,133,244,0.08);
            font-size: 14px; line-height: 1.7;
        }

        /* Itens de preço renderizados pelo Gemini */
        .price-item {
            display: flex; justify-content: space-between;
            align-items: center; padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .price-item:last-of-type { border-bottom: none; }
        .price-loja { font-weight: 600; }
        .price-val  { color: var(--blue); font-weight: 700; font-size: 15px; }
        .disclaimer { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; }
        .section-title {
            font-weight: 700; font-size: 12px; color: var(--muted);
            text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px;
        }

        /* Painel config */
        #config-panel {
            display: none; position: fixed; inset: 0;
            background: #fff; z-index: 9999;
            padding: 40px 20px 30px; overflow-y: auto;
        }
        .cfg-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 24px;
        }
        .cfg-header h2 { margin: 0; }
        .close-btn {
            background: #f0f0f0; border: none; font-size: 18px;
            cursor: pointer; border-radius: 50%; width: 36px; height: 36px;
        }
        label {
            font-size: 11px; font-weight: 700; color: var(--muted);
            display: block; margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .info-box {
            background: #e8f0fe; border-radius: 12px;
            padding: 14px; font-size: 12px; color: #333;
            margin-top: 16px; line-height: 1.7;
        }
        .info-box a { color: var(--blue); }

        /* Spinner */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin .8s linear infinite; }

        /* Toast */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%);
            background: #222; color: #fff;
            padding: 10px 22px; border-radius: 50px;
            font-size: 14px; z-index: 99999;
            pointer-events: none;
            animation: fadeIO 2.6s forwards;
        }
        @keyframes fadeIO {
            0%   { opacity:0; transform:translateX(-50%) translateY(8px); }
            15%  { opacity:1; transform:translateX(-50%) translateY(0); }
            80%  { opacity:1; }
            100% { opacity:0; }
        }
        .err { color: var(--red); }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>🛒 SACO.pt</h1>
        <span class="badge">V15 · GEMINI FREE</span>
    </div>

    <div class="card">
        <button class="btn btn-cam" id="cam-btn"
                onclick="document.getElementById('file-input').click()">
            📸 Tirar Foto / Carregar Imagem
        </button>
        <input type="file" id="file-input" style="display:none"
               accept="image/*" capture="environment"
               onchange="handleImage(event)">

        <input type="text" id="product-input"
               placeholder="Ou escreve o nome do produto...">

        <button class="btn btn-search" id="search-btn" onclick="runSearch()">
            🔍 Ver Preços
        </button>

        <button class="btn btn-ghost" onclick="openConfig()">
            ⚙️ Configurar Gemini API Key
        </button>
    </div>

    <div id="output"></div>
</div>

<!-- Painel configurações -->
<div id="config-panel">
    <div class="cfg-header">
        <h2>⚙️ Definições</h2>
        <button class="close-btn" onclick="closeConfig()">✕</button>
    </div>

    <label>Gemini API Key</label>
    <input type="password" id="gem-key" placeholder="AIza...">

    <button class="btn btn-cam" onclick="saveConfig()">💾 Guardar</button>
    <button class="btn btn-danger" onclick="clearConfig()">🗑️ Apagar Key</button>

    <div class="info-box">
        🔐 Guardada apenas neste dispositivo.<br><br>
        Obter key gratuita em:<br>
        👉 <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a><br><br>
        ℹ️ Usa <b>Gemini 2.5 Flash</b> com Google Search integrado.<br>
        Free tier: 10 pedidos/min · 250 pedidos/dia — mais que suficiente para uso pessoal.
    </div>
</div>

<script>
// ── Constantes ───────────────────────────────────────────────────────
const GEMINI_MODEL   = 'gemini-2.5-flash';
const GEMINI_BASE    = 'https://generativelanguage.googleapis.com/v1beta/models';

// ── Config ───────────────────────────────────────────────────────────
function openConfig() {
    document.getElementById('config-panel').style.display = 'block';
    if (getKey()) document.getElementById('gem-key').placeholder = '(guardada) AIza...';
}
function closeConfig() { document.getElementById('config-panel').style.display = 'none'; }

function saveConfig() {
    const v = document.getElementById('gem-key').value.trim();
    if (!v) { toast('⚠️ Introduz uma key'); return; }
    if (!v.startsWith('AIza')) { toast('⚠️ Key inválida (deve começar com AIza)'); return; }
    localStorage.setItem('gem_key', v);
    closeConfig();
    toast('✅ Key guardada!');
}
function clearConfig() {
    if (!confirm('Apagar a Gemini API Key?')) return;
    localStorage.removeItem('gem_key');
    document.getElementById('gem-key').value = '';
    document.getElementById('gem-key').placeholder = 'AIza...';
    closeConfig();
    toast('🗑️ Key apagada.');
}

function getKey() { return localStorage.getItem('gem_key'); }

function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2700);
}

// ── UI ───────────────────────────────────────────────────────────────
function setLoading(on) {
    document.getElementById('cam-btn').disabled = on;
    document.getElementById('search-btn').disabled = on;
}
function show(html) {
    const el = document.getElementById('output');
    el.style.display = 'block';
    el.innerHTML = html;
}
function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Gemini REST call ─────────────────────────────────────────────────
async function gemini(payload) {
    const key = getKey();
    if (!key) throw new Error('KEY_MISSING');

    const url = `${GEMINI_BASE}/${GEMINI_MODEL}:generateContent?key=${key}`;
    const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const data = await resp.json();

    // Erros da API Gemini vêm sempre em data.error
    if (data.error) throw new Error(data.error.message || `HTTP ${resp.status}`);
    return data;
}

// Extrai texto da resposta Gemini
function getText(data) {
    try {
        return data.candidates[0].content.parts
            .filter(p => p.text).map(p => p.text).join('').trim();
    } catch { return ''; }
}

// ── Leitura de imagem → base64 ───────────────────────────────────────
function readImage(file) {
    return new Promise((res, rej) => {
        const r = new FileReader();
        r.onerror = () => rej(new Error('Erro ao ler ficheiro'));
        r.onload = () => {
            const raw = r.result;
            res({
                mimeType: raw.split(';')[0].split(':')[1] || 'image/jpeg',
                base64:   raw.split(',')[1]
            });
        };
        r.readAsDataURL(file);
    });
}

// ── FOTO → identificar produto ───────────────────────────────────────
async function handleImage(event) {
    const file = event.target.files[0];
    event.target.value = '';
    if (!file) return;

    if (!getKey()) { alert('⚠️ Falta a Gemini API Key!\nVai a ⚙️ Configurar.'); return; }

    // Valida tipo de ficheiro
    if (!file.type.startsWith('image/')) {
        show('<span class="err">❌ Ficheiro não é uma imagem válida.</span>');
        return;
    }

    setLoading(true);
    show('<span class="spin">⌛</span> A identificar produto na imagem...');

    try {
        const { base64, mimeType } = await readImage(file);

        const data = await gemini({
            contents: [{
                parts: [
                    {
                        inline_data: { mime_type: mimeType, data: base64 }
                    },
                    {
                        text: 'Identifica este produto de supermercado: marca e nome completo. Responde APENAS com o nome do produto, sem mais texto, sem pontuação final.'
                    }
                ]
            }],
            generationConfig: { maxOutputTokens: 60, temperature: 0 }
        });

        const name = getText(data);
        if (!name) throw new Error('Produto não identificado. Tenta uma foto mais clara.');

        document.getElementById('product-input').value = name;
        show(`✅ Identificado: <b>${esc(name)}</b><br><span class="spin">🔍</span> A pesquisar preços...`);
        await runSearch();

    } catch (e) {
        handleError(e, 'Identificação');
    } finally {
        setLoading(false);
    }
}

// ── PESQUISA DE PREÇOS com Google Search Grounding ───────────────────
async function runSearch() {
    const q = document.getElementById('product-input').value.trim();
    if (!q) { alert('⚠️ Escreve ou fotografa um produto primeiro.'); return; }
    if (!getKey()) { alert('⚠️ Falta a Gemini API Key!\nVai a ⚙️ Configurar.'); return; }

    setLoading(true);
    show('<span class="spin">🌐</span> A pesquisar preços reais em supermercados...');

    try {
        const data = await gemini({
            system_instruction: {
                parts: [{
                    text: `És um assistente de comparação de preços em supermercados portugueses.
Usa SEMPRE a ferramenta de pesquisa Google para encontrar preços actuais.
Pesquisa em: Continente, Pingo Doce, Auchan, Lidl, Intermarché.
Responde APENAS com HTML usando este formato para cada loja encontrada:
<div class="price-item"><span class="price-loja">🏪 NOME_LOJA</span><span class="price-val">X,XX €</span></div>
Ordena do mais barato ao mais caro. Omite lojas sem preço disponível.
No final SEMPRE adiciona: <p class="disclaimer">⚠️ Preços indicativos. Confirma no site oficial da loja.</p>
Não escrevas nenhum outro texto fora do HTML.`
                }]
            },
            contents: [{
                role: 'user',
                parts: [{
                    text: `Pesquisa o preço actual de "${q}" nos supermercados portugueses (Continente, Pingo Doce, Auchan, Lidl, Intermarché) e apresenta a lista de preços.`
                }]
            }],
            tools: [{
                google_search: {}   // Google Search Grounding nativo — gratuito e sem APIs extra
            }],
            generationConfig: {
                maxOutputTokens: 800,
                temperature: 0.1
            }
        });

        const html = getText(data);

        if (!html) {
            show(`<span class="err">⚠️ Sem resultados para "<b>${esc(q)}</b>".<br>Tenta um nome mais específico.</span>`);
        } else {
            show(`<div class="section-title">💰 Preços — ${esc(q)}</div>${html}`);
        }

    } catch (e) {
        handleError(e, 'Pesquisa');
    } finally {
        setLoading(false);
    }
}

// ── Erros ────────────────────────────────────────────────────────────
function handleError(e, ctx) {
    if (e.message === 'KEY_MISSING') {
        show(`<span class="err">⚠️ Sem API Key. Vai a ⚙️ <b>Configurar Gemini API Key</b>.</span>`);
    } else if (e.message.includes('API_KEY_INVALID') || e.message.includes('400')) {
        show(`<span class="err">❌ Key inválida ou expirada.<br>Verifica em <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>.</span>`);
    } else if (e.message.includes('429') || e.message.includes('RESOURCE_EXHAUSTED')) {
        show(`<span class="err">⏳ Limite de pedidos atingido. Aguarda 1 minuto e tenta de novo.</span>`);
    } else if (e.message.includes('SAFETY')) {
        show(`<span class="err">⚠️ Imagem bloqueada por filtros de segurança. Tenta outra foto.</span>`);
    } else {
        show(`<span class="err">❌ Erro (${esc(ctx)}): ${esc(e.message)}</span>`);
    }
}
</script>
</body>
</html>
