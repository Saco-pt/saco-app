<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | Sniper vs Cabaz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root { 
            --primary: #007aff; --success: #34c759; --warning: #ffcc00; 
            --danger: #ff3b30; --bg: #f2f2f7; --card: #ffffff;
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); margin: 0; padding: 15px; color: #1c1c1e;
        }

        .app-container { max-width: 480px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; }
        .header h1 { font-size: 26px; font-weight: 800; margin: 0; color: var(--primary); }
        .config-btn { font-size: 22px; cursor: pointer; opacity: 0.5; }

        /* Card Perfil */
        .card-perfil { 
            background: var(--card); border-radius: 20px; padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .inputs-perfil { display: flex; gap: 10px; align-items: center; font-weight: bold; }
        .inputs-perfil input { width: 35px; border: 1px solid #ddd; border-radius: 8px; text-align: center; padding: 4px; }

        /* Scanner */
        #scanner-view { 
            width: 100%; height: 0; overflow: hidden; transition: 0.3s; 
            border-radius: 20px; background: #000; position: relative;
        }
        #scanner-view.active { height: 250px; margin-bottom: 15px; border: 3px solid var(--primary); }
        #torch-btn { 
            position: absolute; top: 15px; right: 15px; z-index: 10; 
            background: rgba(0,0,0,0.5); color: white; border: none; padding: 12px; border-radius: 50%;
        }

        /* Inputs */
        .input-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"] { 
            flex: 1; padding: 16px; border: none; border-radius: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); outline: none;
        }
        .btn-round { background: var(--card); border: none; border-radius: 15px; padding: 0 15px; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-add { background: var(--primary); color: white; font-weight: bold; }

        /* Lista */
        .list-area { margin-bottom: 20px; }
        .item-tag { 
            background: var(--card); padding: 12px 15px; border-radius: 12px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #ccc;
        }
        .item-tag.latest { border-left-color: var(--success); background: #f0fff4; }

        /* SEÇÕES DE AÇÃO */
        .section-title { font-size: 12px; font-weight: 800; color: #8e8e93; margin: 15px 0 8px 5px; text-transform: uppercase; }
        
        .btn-action { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            font-weight: 700; font-size: 15px; cursor: pointer; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-sniper { background: var(--success); color: white; box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3); }
        .btn-familiar { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        .btn-clear { background: #e5e5ea; color: #ff3b30; padding: 12px; font-size: 13px; }

        /* Resultado */
        #res-box { 
            margin-top: 20px; padding: 20px; background: white; border-radius: 20px; 
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee;
        }

        /* Config */
        #modal-config { display: none; position: fixed; inset: 0; background: white; z-index: 100; padding: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SACO.pt</h1>
        <div class="config-btn" onclick="toggleConfig()">⚙️</div>
    </div>

    <div class="card-perfil">
        <div class="inputs-perfil">
            👨 <input type="number" id="adultos" value="2">
            👶 <input type="number" id="criancas" value="1">
        </div>
        <div style="font-size: 11px; color: #888;">PERFIL FAMILIAR</div>
    </div>

    <div id="scanner-view">
        <button id="torch-btn" onclick="toggleTorch()">🔦</button>
    </div>

    <div class="input-box">
        <button class="btn-round" onclick="openScanner()">📷</button>
        <input type="text" id="main-input" placeholder="Produto ou scan...">
        <button class="btn-round btn-add" onclick="addItem()">+</button>
    </div>

    <div id="lista-compras" class="list-area"></div>

    <div class="section-title">Modo Sniper (Decisão Rápida)</div>
    <button class="btn-action btn-sniper" onclick="modoSniper()">🎯 Comparar Último Artigo</button>

    <div class="section-title">Modo Familiar (Planeamento)</div>
    <button class="btn-action btn-familiar" onclick="modoFamiliar()">📦 Cabaz & Timing Mensal</button>
    
    <button class="btn-action btn-clear" onclick="limpar()">🗑️ Limpar Lista</button>

    <div id="res-box"></div>
</div>

<!-- Modal Config -->
<div id="modal-config">
    <h2 style="margin-top:0">Configurações</h2>
    <label>Groq Key:</label>
    <input type="password" id="k-groq" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:10px; border:1px solid #ddd;">
    <label>Tavily Key:</label>
    <input type="password" id="k-tavily" style="width:100%; padding:12px; margin:10px 0 20px; border-radius:10px; border:1px solid #ddd;">
    <button class="btn-action btn-familiar" onclick="saveKeys()">Guardar</button>
    <center><p onclick="toggleConfig()" style="margin-top:20px; color:#888;">Fechar</p></center>
</div>

<script>
    let list = [];
    let track = null;

    function toggleConfig() {
        const m = document.getElementById('modal-config');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
        document.getElementById('k-groq').value = localStorage.getItem('groq_key') || '';
        document.getElementById('k-tavily').value = localStorage.getItem('tavily_key') || '';
    }

    function saveKeys() {
        localStorage.setItem('groq_key', document.getElementById('k-groq').value);
        localStorage.setItem('tavily_key', document.getElementById('k-tavily').value);
        toggleConfig();
    }

    function openScanner() {
        const v = document.getElementById('scanner-view');
        v.classList.add('active');
        document.getElementById('torch-btn').style.display = "block";
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: v, constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => {
            if(!err) Quagga.start();
            setTimeout(() => {
                const vid = document.querySelector('video');
                if(vid) track = vid.srcObject.getVideoTracks()[0];
            }, 1000);
        });
    }

    function toggleTorch() {
        if(track && track.getCapabilities().torch) {
            track.applyConstraints({ advanced: [{ torch: !track.getSettings().torch }] });
        }
    }

    Quagga.onDetected((data) => {
        Quagga.stop();
        document.getElementById('scanner-view').classList.remove('active');
        addItem(data.codeResult.code);
    });

    function addItem(val) {
        const inp = document.getElementById('main-input');
        const txt = val || inp.value.trim();
        if(!txt) return;
        list.push(txt);
        inp.value = '';
        render();
    }

    function render() {
        const cont = document.getElementById('lista-compras');
        cont.innerHTML = list.map((item, i) => `
            <div class="item-tag ${i === list.length-1 ? 'latest' : ''}">
                <span><b>${item}</b></span>
                <span style="color:var(--danger); font-weight:bold; cursor:pointer;" onclick="list.splice(${i},1);render()">✕</span>
            </div>
        `).join('');
    }

    function limpar() { list = []; render(); document.getElementById('res-box').style.display="none"; }

    // --- LÓGICA SNIPER (ARTIGO ÚNICO) ---
    async function modoSniper() {
        const gKey = localStorage.getItem('groq_key');
        const tKey = localStorage.getItem('tavily_key');
        if(!gKey || !tKey || list.length === 0) return alert("Verifica as chaves e a lista!");

        const item = list[list.length - 1];
        const res = document.getElementById('res-box');
        res.style.display = "block";
        res.innerHTML = `🎯 <b>Sniper: A comparar preços para ${item}...</b>`;

        try {
            const s = await fetch("https://api.tavily.com/search", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ api_key: tKey, query: `preço hoje Portugal: ${item} Continente Pingo Doce Lidl Mercadona`, search_depth: "advanced" })
            });
            const sD = await s.json();

            const g = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${gKey}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "És um comparador Sniper. Dá apenas o preço do artigo selecionado nos vários supermercados. Sê curto e direto." },
                               { role: "user", content: `Artigo: ${item} \n\n Dados: ${sD.results.map(r=>r.content).join("\n")}` }]
                })
            });
            const gD = await g.json();
            res.innerHTML = `<b>📍 Sniper Veredito: ${item}</b><br><br>` + gD.choices[0].message.content.replace(/\n/g, '<br>');
        } catch(e) { res.innerHTML = "❌ Erro Sniper."; }
    }

    // --- LÓGICA FAMILIAR (CABAZ E TIMING) ---
    async function modoFamiliar() {
        const gKey = localStorage.getItem('groq_key');
        if(!gKey) return toggleConfig();
        
        const res = document.getElementById('res-box');
        res.style.display = "block";
        res.innerHTML = "📦 <b>Familiar: A analisar quantidades e calendário...</b>";

        const hoje = new Date();
        const perfil = `${document.getElementById('adultos').value} adultos e ${document.getElementById('criancas').value} crianças`;

        try {
            const g = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${gKey}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: `Data: ${hoje.toLocaleDateString()}. Diz se hoje é o dia ideal para a compra mensal e sugere o cabaz essencial para o perfil.` },
                               { role: "user", content: `Perfil: ${perfil}` }]
                })
            });
            const gD = await g.json();
            res.innerHTML = "<b>🕒 Cabaz & Timing Familiar:</b><br><br>" + gD.choices[0].message.content.replace(/\n/g, '<br>');
        } catch(e) { res.innerHTML = "❌ Erro Familiar."; }
    }
</script>
</body>
</html>
