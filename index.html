<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V10.0 Pure Data</title>
    <style>
        :root { --primary: #007aff; --sniper: #34c759; --bg: #f2f2f7; --card: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1c1c1e; }
        .container { max-width: 480px; margin: 0 auto; }
        
        .version-badge { font-size: 10px; font-weight: 800; background: #000; color: #fff; padding: 4px 8px; border-radius: 6px; float: right; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; color: var(--primary); }

        #image-preview-container { width: 100%; height: 180px; background: #000; border-radius: 15px; margin-bottom: 15px; display: none; overflow: hidden; }
        #image-preview { width: 100%; height: 100%; object-fit: cover; }

        .input-zone { background: var(--card); border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn-camera { background: var(--primary); color: white; }
        .btn-search { background: var(--sniper); color: white; }
        
        input[type="text"] { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }

        #ia-output { margin-top: 20px; padding: 15px; background: white; border-radius: 15px; display: none; border: 1px solid #ddd; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        th { font-size: 12px; text-transform: uppercase; color: #666; }
        
        #config-panel { display: none; position: fixed; inset: 0; background: white; z-index: 1000; padding: 40px 25px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="version-badge">V10.0</div>
    <div class="header">
        <h1>SACO.pt</h1>
        <div onclick="toggleConfig()" style="cursor:pointer;">⚙️</div>
    </div>

    <div id="image-preview-container"><img id="image-preview" src=""></div>

    <div class="input-zone">
        <button class="btn-main btn-camera" onclick="document.getElementById('file-input').click()">📸 FOTO PRODUTO</button>
        <input type="file" id="file-input" class="hidden" accept="image/*" capture="environment" onchange="handleVision(event)">
        
        <input type="text" id="product-input" placeholder="Nome do produto...">
        <button class="btn-main btn-search" onclick="runManualSearch()">🔍 OBTER PREÇOS HOJE</button>
    </div>

    <div id="ia-output"></div>
</div>

<div id="config-panel">
    <h2 onclick="toggleConfig()">✕ Fechar</h2>
    <input type="password" id="save-groq" placeholder="Groq API Key" style="width:100%; padding:15px; margin-bottom:10px;">
    <input type="password" id="save-tavily" placeholder="Tavily API Key" style="width:100%; padding:15px; margin-bottom:10px;">
    <button class="btn-main btn-camera" onclick="confirmKeys()">GUARDAR</button>
</div>

<script>
    function toggleConfig() {
        const p = document.getElementById('config-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function confirmKeys() {
        localStorage.setItem('groq_key', document.getElementById('save-groq').value);
        localStorage.setItem('tavily_key', document.getElementById('save-tavily').value);
        toggleConfig();
    }

    async function encodeImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
        });
    }

    async function handleVision(event) {
        const file = event.target.files[0];
        const gK = localStorage.getItem('groq_key');
        if (!file || !gK) return alert("Falta API Key!");

        document.getElementById('image-preview').src = URL.createObjectURL(file);
        document.getElementById('image-preview-container').style.display = 'block';

        const out = document.getElementById('ia-output');
        out.style.display = "block";
        out.innerHTML = "⌛ Identificando...";

        try {
            const base64 = await encodeImage(file);
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${gK}` },
                body: JSON.stringify({
                    model: "llama-3.2-11b-vision-preview",
                    messages: [{
                        role: "user",
                        content: [
                            { type: "text", text: "Identifica o produto. Responde APENAS o Nome e Marca." },
                            { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } }
                        ]
                    }]
                })
            });
            const data = await res.json();
            const name = data.choices[0].message.content;
            document.getElementById('product-input').value = name;
            runManualSearch();
        } catch (e) { out.innerHTML = "❌ Erro Visão."; }
    }

    async function runManualSearch() {
        const query = document.getElementById('product-input').value;
        const gK = localStorage.getItem('groq_key');
        const tK = localStorage.getItem('tavily_key');
        const out = document.getElementById('ia-output');

        if (!query || !tK) return;

        out.style.display = "block";
        out.innerHTML = `⌛ Procurando preços reais para: ${query}...`;

        try {
            const search = await fetch("https://api.tavily.com/search", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    api_key: tK,
                    query: `preço hoje "${query}" Portugal site:continente.pt OR site:auchan.pt OR site:pingo-doce.pt OR site:elcorteingles.pt OR "Lidl" OR "Mercadona"`,
                    search_depth: "advanced"
                })
            });
            const sData = await search.json();

            const final = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${gK}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "És um extrator de dados de preços. Cria uma tabela HTML com: Loja, Preço (€) e Data/Obs. Não dês conselhos, não dês sugestões, não fales. Apenas a tabela ou 'Preço não encontrado'." },
                        { role: "user", content: `Dados: ${JSON.stringify(sData.results)}` }
                    ]
                })
            });
            const fData = await final.json();
            out.innerHTML = fData.choices[0].message.content;
        } catch (e) { out.innerHTML = "❌ Erro Scraper."; }
    }
</script>
</body>
</html>
