<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt V92.0 - API Discovery</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 110px; color: var(--text); -webkit-tap-highlight-color: transparent; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px; border: 1px solid #edf2f7; }
        .btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-sm { padding: 10px; font-size: 13px; margin-top: 5px; }
        select, input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 16px; margin: 10px 0; box-sizing: border-box; background: white; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: white; display: flex; align-items: center; border-top: 1px solid #e2e8f0; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { border: none; background: none; color: #64748b; display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: center; }
        .nav-item i { font-size: 28px; font-style: normal; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
        .loading { animation: pulse 1.5s infinite; color: var(--primary); font-weight: bold; text-align: center; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container" id="main-view"></div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="ui.render('home', this)"><i>🏠</i><span>Stock</span></button>
    <button class="nav-item" onclick="ui.render('scan', this)"><i>📸</i><span>Scan</span></button>
    <button class="nav-item" onclick="ui.render('search', this)"><i>🔍</i><span>Procura</span></button>
    <button class="nav-item" onclick="ui.render('data', this)"><i>⚙️</i><span>Dados</span></button>
</nav>

<script>
/** * DATABASE */
const app = {
    db: JSON.parse(localStorage.getItem('saco_db')) || {
        inventory: {}, 
        config: { api_key: '', model: 'models/gemini-1.5-flash', available_models: [] }
    },
    save() { localStorage.setItem('saco_db', JSON.stringify(this.db)); }
};

/** * UI ENGINE */
const ui = {
    render(tab, el) {
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        const view = document.getElementById('main-view');

        if (tab === 'home') {
            view.innerHTML = `<h2>A Minha Despensa 🏠</h2>` + this.renderInventory();
        }

        if (tab === 'search') {
            view.innerHTML = `
                <h2>Procura Rápida 🔍</h2>
                <div class="card">
                    <input type="text" id="item-input" placeholder="Ex: Cerveja, Leite...">
                    <button class="btn" onclick="logic.findNow()">Pesquisar Artigo</button>
                    <div id="search-result" style="margin-top:20px;"></div>
                </div>`;
        }

        if (tab === 'data') {
            view.innerHTML = `
                <h2>Definições de IA ⚙️</h2>
                <div class="card">
                    <label><b>API Key (Google AI Studio)</b></label>
                    <input type="password" id="api-key" value="${app.db.config.api_key}" placeholder="Insere a tua API Key">
                    
                    <label><b>Motor Ativo:</b></label>
                    <select id="model-select">
                        ${app.db.config.available_models.length > 0 
                            ? app.db.config.available_models.map(m => `<option value="${m.name}" ${app.db.config.model === m.name ? 'selected' : ''}>${m.displayName}</option>`).join('')
                            : `<option value="${app.db.config.model}">${app.db.config.model}</option>`}
                    </select>
                    
                    <button class="btn btn-sm btn-outline" id="btn-refresh" onclick="logic.fetchModels()">🔄 Atualizar Lista de Modelos</button>
                    <button class="btn" style="margin-top:20px;" onclick="logic.saveSettings()">✅ Guardar Configurações</button>
                </div>
                <button class="btn btn-outline" onclick="logic.export()">📥 Backup Dados</button>
            `;
        }
    },
    renderInventory() {
        const items = Object.values(app.db.inventory);
        return items.length ? items.map(i => `<div class="card"><b>${i.nome}</b><br><small>${i.qtd} un | ${i.unit_price}€</small></div>`).join('') : '<div class="card">Vazio.</div>';
    }
};

/** * LOGIC ENGINE */
const logic = {
    // FUNÇÃO PARA LISTAR MODELOS VÁLIDOS DA TUA CHAVE
    async fetchModels() {
        const key = document.getElementById('api-key').value;
        const btn = document.getElementById('btn-refresh');
        if(!key) return alert("Insere a chave primeiro!");

        btn.innerText = "A verificar...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await res.json();
            
            if(data.models) {
                // Filtra apenas modelos que suportam geração de conteúdo
                app.db.config.available_models = data.models
                    .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                    .map(m => ({ name: m.name, displayName: m.displayName }));
                
                app.save();
                ui.render('data'); // Recarrega o select
                alert("Modelos atualizados com sucesso!");
            } else {
                throw new Error("Chave inválida");
            }
        } catch (e) {
            alert("Erro ao validar chave ou obter modelos.");
            btn.innerText = "🔄 Tentar novamente";
        }
    },

    saveSettings() {
        app.db.config.api_key = document.getElementById('api-key').value;
        app.db.config.model = document.getElementById('model-select').value;
        app.save();
        alert("Configurações Guardadas!");
    },

    async findNow() {
        const query = document.getElementById('item-input').value;
        const resDiv = document.getElementById('search-result');
        const { api_key, model } = app.db.config;

        if(!query || !api_key) return alert("Configura a chave nos Dados!");

        resDiv.innerHTML = `<div class="loading">🤖 IA a pesquisar folhetos...</div>`;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const prompt = `Responde em JSON: {"nome": "Nome Completo", "loja": "Loja", "preco": "0.00€"}. 
                            Pesquisa o melhor preço para "${query}" em Portugal perto de lat:${pos.coords.latitude}.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${api_key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                const res = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());

                resDiv.innerHTML = `
                    <div class="card" style="border: 2px solid var(--primary);">
                        <h4 style="margin:0">${res.nome}</h4>
                        <p>📍 <b>${res.loja}</b></p>
                        <h2 style="color:var(--success); margin:10px 0;">${res.preco}</h2>
                        <button class="btn" style="background:#4285F4" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(res.loja + ' ' + res.nome)}')">📍 Ver no Maps</button>
                    </div>`;
            } catch (e) {
                resDiv.innerHTML = `<p style="color:red">Erro na consulta. Tenta o motor Gemini 1.5 Flash.</p>`;
            }
        });
    }
};

ui.render('home');
</script>
</body>
</html>
