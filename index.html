<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V16</title>
    <style>
        :root { --blue: #4285f4; --green: #1a8a4a; --bg: #f1f3f4; --red: #e53935; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 16px; margin: 0; }
        .container { max-width: 460px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .badge { font-size: 10px; background: var(--blue); color: white; padding: 4px 10px; border-radius: 50px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); margin-bottom: 14px; }
        .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-barcode { background: #333; color: #fff; }
        .btn-cam { background: var(--blue); color: #fff; }
        .btn-search { background: var(--green); color: #fff; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 14px; margin-bottom: 10px; outline: none; }
        #output { background: white; border-radius: 20px; padding: 18px; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .product-card { background: #f8f9ff; border-radius: 14px; padding: 14px; display: flex; gap: 12px; align-items: center; margin-bottom: 15px; border: 1px solid #e8eaff; }
        .product-card img { width: 56px; height: 56px; object-fit: contain; background: white; border-radius: 8px; }
        #config-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; padding: 40px 20px; }
        .err { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="color:var(--blue); margin:0;">🛒 SACO.pt</h1>
        <span class="badge">V16 · BARCODE</span>
    </div>

    <div class="card">
        <button class="btn btn-barcode" onclick="document.getElementById('barcode-input').click()">〓 Fotografar Código de Barras</button>
        <input type="file" id="barcode-input" style="display:none" accept="image/*" capture="environment" onchange="handleBarcode(event)">
        
        <div style="text-align:center; color:#888; margin: 10px 0; font-size: 12px;">— OU —</div>

        <button class="btn btn-cam" onclick="document.getElementById('photo-input').click()">📸 Fotografar Produto</button>
        <input type="file" id="photo-input" style="display:none" accept="image/*" capture="environment" onchange="handlePhoto(event)">

        <input type="text" id="product-input" placeholder="Nome do produto...">
        <button class="btn btn-search" id="search-btn" onclick="runSearch()">🔍 Ver Preços</button>
        <button class="btn" style="background:none; border:1px solid #ddd; color:#888" onclick="document.getElementById('config-panel').style.display='block'">⚙️ API Key</button>
    </div>
    <div id="output"></div>
</div>

<div id="config-panel">
    <h2>⚙️ Configurações</h2>
    <label style="font-size:12px; font-weight:bold; color:#888">GEMINI API KEY (começa com AIza)</label>
    <input type="password" id="gem-key" placeholder="Cola aqui a tua key">
    <button class="btn btn-cam" onclick="saveConfig()">💾 Guardar</button>
    <button class="btn" style="background:#eee" onclick="document.getElementById('config-panel').style.display='none'">Fechar</button>
</div>

<script>
const GEMINI_MODEL = 'gemini-2.5-flash';
const OFF_API = 'https://world.openfoodfacts.org/api/v2/product';

function saveConfig() {
    const key = document.getElementById('gem-key').value.trim();
    if(key.startsWith('AIza')) {
        localStorage.setItem('gem_key', key);
        document.getElementById('config-panel').style.display='none';
        alert('✅ Key guardada!');
    } else { alert('⚠️ Key inválida!'); }
}

async function geminiCall(payload) {
    const key = localStorage.getItem('gem_key');
    if (!key) throw new Error('KEY_MISSING');
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    return await resp.json();
}

async function handleBarcode(event) {
    const file = event.target.files[0];
    if (!file) return;
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.innerHTML = "⌛ Lendo código de barras...";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        try {
            const data = await geminiCall({
                contents: [{ parts: [
                    { inline_data: { mime_type: file.type, data: base64 } },
                    { text: "Extrai o número EAN/UPC deste código de barras. Responde APENAS o número." }
                ]}]
            });
            const ean = data.candidates[0].content.parts[0].text.replace(/\D/g,'');
            
            out.innerHTML = `🔍 EAN: ${ean} - Consultando base de dados...`;
            const offResp = await fetch(`${OFF_API}/${ean}.json?fields=product_name,brands,image_front_small_url`);
            const offData = await offResp.json();

            if (offData.status === 1) {
                const name = `${offData.product.brands || ''} ${offData.product.product_name || ''}`;
                document.getElementById('product-input').value = name;
                out.innerHTML = `<div class="product-card"><img src="${offData.product.image_front_small_url}"><div><b>${name}</b><br><small>EAN: ${ean}</small></div></div>`;
                runSearch(out.innerHTML);
            } else { out.innerHTML = "❌ Produto não encontrado. Tenta escrever o nome."; }
        } catch (e) { out.innerHTML = `<span class="err">Erro: ${e.message}</span>`; }
    };
}

async function handlePhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.innerHTML = "⌛ Identificando produto...";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        try {
            const data = await geminiCall({
                contents: [{ parts: [
                    { inline_data: { mime_type: file.type, data: base64 } },
                    { text: "Identifica este produto: marca e nome. Responde apenas o nome." }
                ]}]
            });
            const name = data.candidates[0].content.parts[0].text;
            document.getElementById('product-input').value = name;
            runSearch();
        } catch (e) { out.innerHTML = `<span class="err">Erro: ${e.message}</span>`; }
    };
}

async function runSearch(preHtml = "") {
    const q = document.getElementById('product-input').value;
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.innerHTML = preHtml + "<br>🌐 Pesquisando preços reais...";

    try {
        const data = await geminiCall({
            contents: [{ parts: [{ text: `Pesquisa o preço de "${q}" em Continente, Pingo Doce, Auchan, Lidl e Intermarché em Portugal. Devolve uma tabela HTML simples com Loja e Preço. Se não encontrares, escreve 'Não disponível'.` }] }],
            tools: [{ google_search: {} }]
        });
        out.innerHTML = preHtml + `<h3>Preços Hoje:</h3>` + data.candidates[0].content.parts[0].text;
    } catch (e) { out.innerHTML = `<span class="err">Erro na pesquisa.</span>`; }
}
</script>
</body>
</html>
