<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACO.pt | Comparador Groq</title>
    <style>
        :root { --blue: #007aff; --green: #34c759; --bg: #f5f5f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h1 { color: var(--blue); text-align: center; margin-bottom: 25px; font-size: 26px; }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 15px; border: 1px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); }
        .add-btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #lista { margin-bottom: 20px; min-height: 40px; }
        .item { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .del { color: #ff3b30; font-weight: bold; cursor: pointer; padding: 5px; }
        .compare-btn { width: 100%; background: var(--green); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .compare-btn:active { transform: scale(0.98); }
        .compare-btn:disabled { background: #ccc; }
        #res { margin-top: 25px; padding: 20px; background: #eef9f1; border-radius: 15px; display: none; font-size: 15px; line-height: 1.6; color: #1a1a1a; border: 1px solid #d4edda; }
        .footer-link { display: block; text-align: center; margin-top: 30px; font-size: 11px; color: #bbb; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <h1>🛒 SACO.pt</h1>
    
    <div class="input-box">
        <input type="text" id="p-input" placeholder="O que vais comprar?" onkeypress="if(event.key==='Enter') add()">
        <button class="add-btn" onclick="add()">+</button>
    </div>

    <div id="lista"></div>

    <button id="btn" class="compare-btn" onclick="analisar()">COMPARAR PREÇOS (GROQ)</button>
    
    <div id="res"></div>

    <span class="footer-link" onclick="localStorage.clear(); location.reload();">⚙️ Resetar Chave Groq</span>
</div>

<script>
    let items = [];

    function add() {
        const input = document.getElementById('p-input');
        const val = input.value.trim();
        if (!val) return;
        items.push(val);
        render();
        input.value = '';
    }

    function render() {
        const div = document.getElementById('lista');
        div.innerHTML = items.map((it, idx) => `
            <div class="item">
                <span>${it}</span>
                <span class="del" onclick="items.splice(${idx},1); render()">✕</span>
            </div>
        `).join('');
    }

    async function analisar() {
        // Pede a chave Groq se não existir
        let key = localStorage.getItem('groq_key');
        if (!key) {
            key = prompt("Insira a sua Chave API da Groq (Começa por gsk_):");
            if (!key) return;
            localStorage.setItem('groq_key', key);
        }

        if (items.length === 0) return alert("Adicione produtos primeiro!");

        const resDiv = document.getElementById('res');
        const btn = document.getElementById('btn');
        
        resDiv.style.display = "block";
        resDiv.innerHTML = "⚡ <b>Groq a analisar mercados...</b>";
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${key}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", // Modelo gratuito e muito potente
                    messages: [
                        {
                            role: "system",
                            content: "És um assistente especialista em preços de supermercados em Portugal (Continente, Pingo Doce, Lidl e Auchan). Dá respostas curtas, em bullet points, indicando onde é mais barato."
                        },
                        {
                            role: "user",
                            content: `Analisa estes itens de compras: ${items.join(', ')}. Qual o supermercado em Portugal tem os melhores preços para esta lista hoje? Dá uma estimativa de preço total.`
                        }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            
            if (data.error) {
                resDiv.innerHTML = "❌ <b>Erro:</b> " + data.error.message;
                if(data.error.code === "invalid_api_key") localStorage.removeItem('groq_key');
            } else {
                const text = data.choices[0].message.content;
                resDiv.innerHTML = "<b>Análise da IA (Groq):</b><br><br>" + text.replace(/\n/g, '<br>');
            }
        } catch (e) {
            resDiv.innerHTML = "❌ Erro de rede. Tente novamente.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
