<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoutAI Pro — Apostas Inteligentes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810;
  --s1: #0d1018;
  --s2: #131724;
  --s3: #1a2030;
  --border: #1f2840;
  --border2: #2a3550;
  --g1: #22d3ee;
  --g2: #6366f1;
  --g3: #f59e0b;
  --g4: #10b981;
  --red: #f43f5e;
  --text: #e2e8f4;
  --muted: #4a5878;
  --muted2: #7888a8;
  --win: #10b981;
  --lose: #f43f5e;
  --draw: #64748b;
  --accent: #6366f1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  line-height: 1.5;
  overflow-x: hidden;
}

/* Typography */
h1, h2, h3, .syne { font-family: 'Syne', sans-serif; font-weight: 700; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }

/* Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 30px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--s1);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: linear-gradient(to bottom, var(--g1), var(--g2));
}

.stat-val { font-size: 1.8rem; font-weight: 800; display: block; margin-top: 5px; }
.stat-label { color: var(--muted2); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

/* Tabs */
.tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.tab-btn {
  background: transparent; border: none; color: var(--muted2);
  padding: 10px 20px; cursor: pointer; font-family: 'Syne', sans-serif;
  font-weight: 600; border-radius: 8px; transition: 0.2s;
}
.tab-btn.active { background: var(--s2); color: var(--g1); box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }

/* Main Sections */
.view { display: none; }
.view.active { display: block; }

/* Grid of Fixtures */
.fixtures-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 20px;
}

.fixture-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  transition: transform 0.3s, border-color 0.3s;
}
.fixture-card:hover { transform: translateY(-5px); border-color: var(--accent); }

.fixture-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted2); margin-bottom: 15px; }
.teams { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.team { display: flex; align-items: center; gap: 12px; font-size: 1.1rem; font-weight: 600; }
.team img { width: 28px; height: 28px; object-fit: contain; }

.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Buttons */
.btn {
  padding: 12px; border-radius: 10px; border: none; cursor: pointer;
  font-weight: 600; font-family: 'Figtree'; transition: 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: linear-gradient(135deg, var(--g1), var(--g2)); color: #000; }
.btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text); }
.btn-outline:hover { background: var(--s3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Analysis Panel */
.analysis-panel {
  background: var(--s2); border-radius: 12px; padding: 15px; margin-top: 15px;
  font-size: 0.9rem; border-left: 3px solid var(--g1); display: none;
}

/* Bets List */
.bets-list { display: flex; flex-direction: column; gap: 12px; }
.bet-item {
  background: var(--s1); border: 1px solid var(--border); padding: 15px;
  border-radius: 12px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 50px;
  align-items: center; gap: 15px;
}
.status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; text-align: center; }
.status-win { background: rgba(16, 185, 129, 0.2); color: var(--win); border: 1px solid var(--win); }
.status-lose { background: rgba(244, 63, 94, 0.2); color: var(--lose); border: 1px solid var(--lose); }
.status-pending { background: rgba(100, 116, 139, 0.2); color: var(--muted2); border: 1px solid var(--muted); }

/* Config */
.config-group { margin-bottom: 20px; }
label { display: block; color: var(--muted2); margin-bottom: 8px; font-size: 0.9rem; }
input, select, textarea {
  width: 100%; padding: 12px; background: var(--s2); border: 1px solid var(--border2);
  border-radius: 8px; color: #fff; font-family: inherit;
}

/* Toast */
#toast {
  position: fixed; bottom: 30px; right: 30px; padding: 15px 25px;
  border-radius: 10px; background: var(--s3); border: 1px solid var(--accent);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(150%);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999;
}
#toast.show { transform: translateY(0); }

/* Filters */
.filters-bar { margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; }
.filter-chip { 
  background: var(--s2); border: 1px solid var(--border2); padding: 6px 15px; 
  border-radius: 20px; cursor: pointer; font-size: 0.85rem; color: var(--muted2);
}
.filter-chip.on { border-color: var(--g1); color: var(--g1); background: rgba(34, 211, 238, 0.05); }

@media (max-width: 768px) {
  .bet-item { grid-template-columns: 1fr 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div id="toast"></div>

<div class="container">
  <header>
    <div>
      <h1 class="syne" style="font-size: 1.5rem; background: linear-gradient(to right, #fff, var(--muted2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SCOUTAI PRO</h1>
      <p style="font-size: 0.75rem; color: var(--muted2); margin-top: 2px;">Sistema de Inteligência Preditiva</p>
    </div>
    <div style="text-align: right">
      <div id="header-balance" class="syne" style="font-size: 1.2rem; color: var(--g4);">0,00€</div>
      <div id="header-roi" style="font-size: 0.7rem; color: var(--muted2);">ROI: 0%</div>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-label">Banca Atual</span>
      <span id="stat-bank" class="stat-val mono">0,00€</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Lucro Total</span>
      <span id="stat-profit" class="stat-val mono">0,00€</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Win Rate</span>
      <span id="stat-wr" class="stat-val mono">0%</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Apostas Ativas</span>
      <span id="stat-active" class="stat-val mono">0</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchView('fixtures')">Próximos Jogos</button>
    <button class="tab-btn" onclick="switchView('bets')">Minhas Apostas</button>
    <button class="tab-btn" onclick="switchView('config')">Configurações</button>
  </div>

  <div id="view-fixtures" class="view active">
    <div class="filters-bar">
      <div id="fav-leagues" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
      <button class="btn btn-outline" style="padding: 6px 15px;" onclick="loadFixtures()">🔄 Atualizar Jogos</button>
      <button class="btn btn-primary" style="padding: 6px 15px;" onclick="analyzeAllVisible()">⚡ Análise em Lote</button>
    </div>
    <div id="fixtures-container" class="fixtures-grid">
      <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--muted2);">
        Configure a sua API Key para começar.
      </div>
    </div>
  </div>

  <div id="view-bets" class="view">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 class="syne">Gestão de Banca</h2>
        <button class="btn btn-outline" onclick="refreshBetsStatus()" style="padding: 6px 12px; font-size: 0.8rem;">
            🔄 Refrescar Estados e Resultados
        </button>
    </div>
    <div class="bets-list" id="bets-container">
      </div>
  </div>

  <div id="view-config" class="view">
    <div style="max-width: 600px;">
      <h2 class="syne" style="margin-bottom: 20px;">Definições do Sistema</h2>
      
      <div class="config-group">
        <label>Google Gemini API Key</label>
        <input type="password" id="cfg-gemini" placeholder="AI Analysis Key...">
      </div>

      <div class="config-group">
        <label>API-Football Key (RapidAPI)</label>
        <input type="password" id="cfg-apif" placeholder="Football Data Key...">
      </div>

      <div class="config-group">
        <label>Banca Inicial (€)</label>
        <input type="number" id="cfg-bank" step="10" value="100">
      </div>

      <div class="config-group">
        <label>Modelo de IA Preferencial</label>
        <select id="cfg-model">
          <option value="gemini-1.5-flash">Gemini 1.5 Flash (Rápido)</option>
          <option value="gemini-1.5-pro">Gemini 1.5 Pro (Preciso)</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 30px;">
        <button class="btn btn-primary" style="flex: 1" onclick="saveConfig()">Guardar Configurações</button>
        <button class="btn btn-outline" onclick="exportData()">Exportar JSON</button>
        <button class="btn btn-outline" style="color: var(--red); border-color: var(--red);" onclick="clearAllData()">Limpar Tudo</button>
      </div>
    </div>
  </div>

</div>

<script>
/* SCOUTAI PRO - CORE LOGIC
*/

let DB = {
  cfg: {
    gemini: '',
    apif: '',
    bank: 100,
    model: 'gemini-1.5-flash',
    favLeagues: [94, 140, 39, 61, 78] // PT, ES, EN, FR, DE
  },
  bets: [],
  fixtures: []
};

// --- Iniciar App ---
window.onload = () => {
  loadData();
  renderFavLeagues();
  updateHeader();
  if(DB.cfg.apif) loadFixtures();
};

function loadData() {
  const saved = localStorage.getItem('sai_pro_v1');
  if(saved) {
    const parsed = JSON.parse(saved);
    DB = { ...DB, ...parsed };
    // UI Sync
    document.getElementById('cfg-gemini').value = DB.cfg.gemini || '';
    document.getElementById('cfg-apif').value = DB.cfg.apif || '';
    document.getElementById('cfg-bank').value = DB.cfg.bank || 100;
    document.getElementById('cfg-model').value = DB.cfg.model || 'gemini-1.5-flash';
  }
}

function save() {
  localStorage.setItem('sai_pro_v1', JSON.stringify(DB));
}

function saveConfig() {
  DB.cfg.gemini = document.getElementById('cfg-gemini').value;
  DB.cfg.apif = document.getElementById('cfg-apif').value;
  DB.cfg.bank = parseFloat(document.getElementById('cfg-bank').value);
  DB.cfg.model = document.getElementById('cfg-model').value;
  save();
  updateHeader();
  showToast('Definições guardadas!', 'ok');
}

function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  
  const idx = ['fixtures','bets','config'].indexOf(view);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');

  if(view === 'bets') renderBets();
}

// --- API Football ---
async function loadFixtures() {
  if(!DB.cfg.apif) return showToast('Configura a API Football primeiro', 'info');
  
  const container = document.getElementById('fixtures-container');
  container.innerHTML = '<div style="grid-column:1/-1; text-align:center;">A carregar jogos de hoje...</div>';

  try {
    const today = new Date().toISOString().split('T')[0];
    const res = await fetch(`https://v3.football.api-sports.io/fixtures?date=${today}`, {
      headers: {
        'x-apisports-key': DB.cfg.apif,
        'x-rapidapi-host': 'v3.football.api-sports.io'
      }
    });
    const data = await res.json();
    
    // Filtrar apenas ligas favoritas ou status NS (Not Started)
    DB.fixtures = data.response.filter(f => 
      DB.cfg.favLeagues.includes(f.league.id) || f.fixture.status.short === 'NS'
    ).slice(0, 40);

    renderFixtures();
  } catch (err) {
    showToast('Erro ao carregar jogos', 'error');
  }
}

function renderFixtures() {
  const container = document.getElementById('fixtures-container');
  if(DB.fixtures.length === 0) {
    container.innerHTML = 'Nenhum jogo encontrado.';
    return;
  }

  container.innerHTML = DB.fixtures.map(f => `
    <div class="fixture-card" id="f-${f.fixture.id}">
      <div class="fixture-header">
        <span>${f.league.name}</span>
        <span class="mono">${new Date(f.fixture.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
      </div>
      <div class="teams">
        <div class="team"><img src="${f.teams.home.logo}"> ${f.teams.home.name}</div>
        <div class="team"><img src="${f.teams.away.logo}"> ${f.teams.away.name}</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="analyzeFixture('${f.fixture.id}')">⚡ Analisar</button>
        <button class="btn btn-outline" onclick="openBetModal('${f.fixture.id}')">➕ Apostar</button>
      </div>
      <div id="analysis-${f.fixture.id}" class="analysis-panel"></div>
    </div>
  `).join('');
}

// --- IA Analysis (Gemini) ---
async function analyzeFixture(id) {
  if(!DB.cfg.gemini) return showToast('Falta API Key Gemini', 'error');
  
  const fixture = DB.fixtures.find(x => x.fixture.id == id);
  const panel = document.getElementById(`analysis-${id}`);
  panel.style.display = 'block';
  panel.innerHTML = '<span class="mono">🤖 IA a analisar...</span>';

  const prompt = `Analisa este jogo de futebol: ${fixture.teams.home.name} vs ${fixture.teams.away.name}. 
  Liga: ${fixture.league.name}. 
  Responde em PT-PT de forma ultra-concisa com: 1. Probabilidade 1X2, 2. Sugestão de mercado, 3. Odds estimadas. Máximo 50 palavras.`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${DB.cfg.model}:generateContent?key=${DB.cfg.gemini}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    const text = data.candidates[0].content.parts[0].text;
    panel.innerHTML = `<div class="mono" style="color: var(--g1); font-size: 0.8rem;">${text.replace(/\n/g, '<br>')}</div>`;
  } catch (e) {
    panel.innerHTML = 'Erro na análise.';
  }
}

// ⚡ ANÁLISE EM LOTE (MELHORADA COM DELAY)
async function analyzeAllVisible() {
    const buttons = Array.from(document.querySelectorAll('.fixture-card button[onclick*="analyzeFixture"]'));
    if (buttons.length === 0) return;
    
    if (!confirm(`Analisar ${buttons.length} jogos em lote? (Respeitando limites da API)`)) return;

    showToast(`A processar ${buttons.length} análises...`, 'info');

    for (const btn of buttons) {
        const fixtureId = btn.getAttribute('onclick').match(/'(\d+)'/)[1];
        btn.disabled = true;
        btn.innerText = "⏳...";

        try {
            await analyzeFixture(fixtureId);
            btn.innerText = "✅ OK";
        } catch (e) {
            btn.innerText = "❌";
        }

        // Delay de 2 segundos entre pedidos para evitar Rate Limit no Gemini
        await new Promise(r => setTimeout(r, 2000));
    }
    showToast("Análise em lote concluída!", "ok");
}

// --- Apostas & Banca ---
function openBetModal(id) {
  const stake = prompt("Valor da aposta (€):", "10");
  if(!stake || isNaN(stake)) return;
  
  const pick = prompt("Mercado (1, X, 2, Over 2.5, etc):", "1");
  if(!pick) return;

  const odd = prompt("Odd:", "1.85");
  if(!odd || isNaN(odd)) return;

  const f = DB.fixtures.find(x => x.fixture.id == id);

  const newBet = {
    id: Date.now(),
    fixtureId: id,
    home: f.teams.home.name,
    away: f.teams.away.name,
    pick: pick,
    odd: parseFloat(odd),
    stake: parseFloat(stake),
    status: 'pending',
    score: '?-?',
    date: new Date().toISOString()
  };

  DB.bets.unshift(newBet);
  save();
  updateHeader();
  showToast('Aposta registada!', 'ok');
}

// 🔄 REFRESCAR ESTADO JOGOS AUTOMATICAMENTE
async function refreshBetsStatus() {
    if (!DB.bets || DB.bets.length === 0) return showToast("Sem apostas", "info");

    const pending = DB.bets.filter(b => b.status === 'pending');
    if (pending.length === 0) return showToast("Tudo atualizado", "ok");

    showToast("Sincronizando resultados...", "info");

    for (let bet of pending) {
        try {
            const res = await fetch(`https://v3.football.api-sports.io/fixtures?id=${bet.fixtureId}`, {
                headers: { 'x-apisports-key': DB.cfg.apif, 'x-rapidapi-host': 'v3.football.api-sports.io' }
            });
            const data = await res.json();
            const f = data.response[0];

            if (f) {
                const status = f.fixture.status.short;
                const homeG = f.goals.home ?? 0;
                const awayG = f.goals.away ?? 0;
                bet.score = `${homeG}-${awayG}`;

                // Se o jogo acabou (FT)
                if (status === 'FT') {
                    let win = false;
                    const result = homeG > awayG ? '1' : (homeG < awayG ? '2' : 'X');
                    
                    // Lógica Básica 1X2
                    if (bet.pick === result) win = true;
                    // Lógica Básica Over 2.5
                    if (bet.pick.toLowerCase().includes('over 2.5') && (homeG + awayG > 2.5)) win = true;

                    bet.status = win ? 'win' : 'lose';
                } else if (['1H','2H','HT'].includes(status)) {
                    bet.score = `Live ${homeG}-${awayG}`;
                }
            }
        } catch (e) { console.error(e); }
        await new Promise(r => setTimeout(r, 600)); // Delay API-Football
    }

    save();
    renderBets();
    updateHeader();
    showToast("Resultados atualizados!", "ok");
}

function renderBets() {
  const container = document.getElementById('bets-container');
  if(DB.bets.length === 0) {
    container.innerHTML = '<p style="text-align:center; color:var(--muted2)">Nenhuma aposta registada.</p>';
    return;
  }

  container.innerHTML = DB.bets.map(b => `
    <div class="bet-item">
      <div>
        <div style="font-weight:600; font-size:0.9rem;">${b.home} vs ${b.away}</div>
        <div style="font-size:0.7rem; color:var(--muted2)">${new Date(b.date).toLocaleDateString()}</div>
      </div>
      <div class="mono">Pick: <span style="color:var(--g1)">${b.pick}</span> @${b.odd}</div>
      <div class="mono">${b.stake.toFixed(2)}€</div>
      <div class="mono" style="text-align:center">
        <span class="status-badge status-${b.status}">${b.status === 'pending' ? b.score : b.status}</span>
      </div>
      <button class="btn" style="color:var(--red); padding:5px;" onclick="deleteBet(${b.id})">✕</button>
    </div>
  `).join('');
}

function deleteBet(id) {
  if(!confirm('Apagar esta aposta?')) return;
  DB.bets = DB.bets.filter(b => b.id !== id);
  save();
  renderBets();
  updateHeader();
}

function updateHeader() {
  let profit = 0;
  let wins = 0;
  let active = 0;

  DB.bets.forEach(b => {
    if(b.status === 'win') {
      profit += (b.stake * b.odd) - b.stake;
      wins++;
    } else if(b.status === 'lose') {
      profit -= b.stake;
    } else {
      active++;
    }
  });

  const currentBank = (DB.cfg.bank || 0) + profit;
  const wr = DB.bets.filter(x=>x.status!=='pending').length > 0 
    ? (wins / DB.bets.filter(x=>x.status!=='pending').length * 100).toFixed(1) 
    : 0;

  document.getElementById('header-balance').innerText = `${currentBank.toFixed(2)}€`;
  document.getElementById('stat-bank').innerText = `${currentBank.toFixed(2)}€`;
  document.getElementById('stat-profit').innerText = `${profit.toFixed(2)}€`;
  document.getElementById('stat-profit').style.color = profit >= 0 ? 'var(--g4)' : 'var(--red)';
  document.getElementById('stat-wr').innerText = `${wr}%`;
  document.getElementById('stat-active').innerText = active;
}

// --- Helpers ---
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.borderColor = type === 'error' ? 'var(--red)' : 'var(--g1)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function renderFavLeagues() {
  const leagues = [
    {id: 94, name: 'Portugal'}, {id: 140, name: 'Espanha'}, 
    {id: 39, name: 'Inglaterra'}, {id: 61, name: 'França'}, {id: 78, name: 'Alemanha'}
  ];
  const el = document.getElementById('fav-leagues');
  el.innerHTML = leagues.map(l => `
    <button class="filter-chip ${DB.cfg.favLeagues.includes(l.id)?'on':''}" onclick="toggleLeague(${l.id})">${l.name}</button>
  `).join('');
}

function toggleLeague(id) {
  if(DB.cfg.favLeagues.includes(id)) {
    DB.cfg.favLeagues = DB.cfg.favLeagues.filter(x => x !== id);
  } else {
    DB.cfg.favLeagues.push(id);
  }
  save();
  renderFavLeagues();
  loadFixtures();
}

function exportData() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute("href", dataStr);
  downloadAnchorNode.setAttribute("download", "scoutai_pro_backup.json");
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
}

function clearAllData() {
  if(confirm('ATENÇÃO: Isto irá apagar todas as apostas e configurações. Continuar?')) {
    localStorage.removeItem('sai_pro_v1');
    location.reload();
  }
}
</script>
