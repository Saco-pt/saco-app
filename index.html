<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACO.pt - Forçar V1</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #f8f9fc; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-new { width: 100%; background: #007aff; color: white; border: none; padding: 20px; border-radius: 20px; font-weight: 800; margin-top: 20px; }
        #debug { margin-top: 20px; padding: 15px; border-radius: 15px; font-size: 14px; text-align: left; display: none; }
    </style>
</head>
<body>

    <div style="font-size: 28px; font-weight: 800; color: #007aff; margin-bottom: 20px;">SACO.pt</div>

    <div class="card">
        <input type="text" id="items" value="Leite" style="width:90%; padding:15px; border-radius:10px; border:1px solid #ddd;">
        <button id="btnFinal" class="btn-new" onclick="validar()">FORÇAR LIGAÇÃO V1</button>
        <div id="debug"></div>
    </div>

    <script>
        const KEY = "AIzaSyBEeOFiu49Lk1CTxCsblRjjNRaDftnJHhM";

        async function validar() {
            const out = document.getElementById('debug');
            const btn = document.getElementById('btnFinal');
            
            out.style.display = "block";
            out.style.background = "#eee";
            out.innerHTML = "A tentar nova rota (v1)...";
            btn.disabled = true;

            try {
                // Forçamos v1 e adicionamos um parâmetro aleatório no fim para enganar a cache
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}&nocache=${Date.now()}`;

                const r = await fetch(url, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Diz OK" }] }] })
                });

                const data = await r.json();

                if (data.error) {
                    out.style.background = "#fff1f1";
                    out.innerHTML = `<b>ERRO NA V1:</b><br>${data.error.message}`;
                } else {
                    out.style.background = "#f0fff4";
                    out.innerHTML = "<b>SUCESSO!</b> A IA respondeu na versão estável.";
                }
            } catch (e) {
                out.innerHTML = "Erro de rede: " + e.message;
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
