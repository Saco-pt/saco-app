<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACO.pt | Comparador de Preços IA</title>
    <style>
        :root { --primary: #007aff; --success: #28a745; --bg: #f5f5f7; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-card { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { color: var(--primary); margin: 0 0 20px 0; font-size: 26px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border: 1px solid #e0e0e0; border-radius: 12px; outline: none; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        #ai-btn { width: 100%; background: var(--success); margin-top: 15px; font-size: 16px; padding: 16px; }
        #lista-compras { margin: 15px 0; min-height: 50px; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; background: #fafafa; margin-bottom: 5px; border-radius: 8px; animation: fadeIn 0.3s ease; }
        #resultado-ia { margin-top: 20px; font-size: 15px; line-height: 1.6; color: #333; background: #f0f7ff; padding: 18px; border-radius: 15px; border-left: 5px solid var(--primary); display: none; }
        .config-link { display: block; text-align: center; font-size: 12px; color: #999; margin-top: 25px; text-decoration: none; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-card">
    <h1>🛒 SACO.pt</h1>
    
    <div class="input-group">
        <input type="text" id="item-input" placeholder="Ex: Leite, Ovos..." onkeypress="if(event.key==='Enter') adicionar()">
        <button onclick="adicionar()">+</button>
    </div>

    <div id="lista-compras"></div>

    <button id="ai-btn" onclick="compararComIA()">COMPARAR PREÇOS IA</button>
    
    <div id="resultado-ia"></div>

    <span class="config-link" onclick="resetKey()">⚙️ Configurar Nova Chave API</span>
</div>

<script>
    let carrinho = [];

    function adicionar() {
        const input = document.getElementById('item-input');
        const valor = input.value.trim();
        if (!valor) return;
        
        carrinho.push(valor);
        const div = document.getElementById('lista-compras');
        div.innerHTML += `<div class="item-row"><span>${valor}</span><span style="color:#ff3b30; cursor:pointer" onclick="this.parentElement.remove()">✕</span></div>`;
        input.value = '';
        input.focus();
    }

    function resetKey() {
        localStorage.removeItem('gemini_api_key');
        alert("Chave removida! Ao clicar em comparar, será pedida uma nova.");
    }

    async function compararComIA() {
        let key = localStorage.getItem('gemini_api_key');
        
        if (!key) {
            key = prompt("Insira a sua Chave API do Gemini (AIzaSy...):");
            if (!key) return;
            localStorage.setItem('gemini_api_key', key);
        }

        if (carrinho.length === 0) {
            alert("Adicione itens à lista primeiro!");
            return;
        }

        const resDiv = document.getElementById('resultado-ia');
        const btn = document.getElementById('ai-btn');
        
        resDiv.style.display = "block";
        resDiv.innerHTML = "⏳ <b>A analisar mercados...</b><br>Verificando Continente, Pingo Doce e Lidl Portugal.";
        btn.disabled = true;

        // ROTA CORRIGIDA: v1 com gemini-1.5-flash
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [{ text: `Age como um assistente de compras em Portugal. Analisa estes itens: ${carrinho.join(', ')}. Indica qual o supermercado mais barato hoje (Continente, Pingo Doce ou Lidl) e dá uma estimativa de preços totais em Euros.` }] 
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                resDiv.innerHTML = "❌ <b>Erro da Google:</b> " + data.error.message;
                // Se a chave for inválida, limpa para pedir de novo
                if(data.error.status === "INVALID_ARGUMENT") localStorage.removeItem('gemini_api_key');
            } else {
                const respostaIA = data.candidates[0].content.parts[0].text;
                // Converter quebras de linha da IA para HTML
                resDiv.innerHTML = "<b>Análise da IA:</b><br>" + respostaIA.replace(/\n/g, '<br>');
            }
        } catch (e) {
            resDiv.innerHTML = "❌ <b>Falha de ligação.</b> Verifique a internet ou a chave.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
