<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V16.1 (2.5 Flash)</title>
    <style>
        :root { --blue: #4285f4; --green: #1a8a4a; --bg: #f1f3f4; --card: #fff; --muted: #888; --red: #e53935; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 16px; color: #1a1a2e; }
        .container { max-width: 460px; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .header h1 { color: var(--blue); font-size: 26px; margin: 0; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 14px; }
        .mode-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin: 14px 0 8px; }
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; margin-bottom: 10px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-barcode { background: #333; color: #fff; }
        .btn-cam { background: var(--blue); color: #fff; }
        .btn-search { background: var(--green); color: #fff; }
        .btn-ghost { background: none; border: 1.5px solid #ddd; color: var(--muted); }
        input { width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; margin-bottom: 10px; font-size: 15px; outline: none; }
        #output { background: var(--card); border-radius: 20px; padding: 18px; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.05); margin-top: 10px; }
        #config-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 9999; padding: 40px 20px; }
        .err-msg { color: var(--red); background: #fff0f0; padding: 10px; border-radius: 8px; border: 1px solid var(--red); font-size: 13px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin 1s linear infinite; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🛒 SACO.pt</h1>
        <span style="font-size: 10px; background: #333; color: #fff; padding: 4px 8px; border-radius: 10px;">V16.1 FLASH 2.5</span>
    </div>

    <div class="card">
        <div class="mode-label">📦 Código de barras</div>
        <button class="btn btn-barcode" id="btn-bar" onclick="document.getElementById('in-bar').click()">〓 Fotografar Código</button>
        <input type="file" id="in-bar" style="display:none" accept="image/*" capture="environment" onchange="processImage(this, 'barcode')">

        <div class="mode-label">📸 Foto do Produto</div>
        <button class="btn btn-cam" id="btn-cam" onclick="document.getElementById('in-cam').click()">📸 Fotografar Produto</button>
        <input type="file" id="in-cam" style="display:none" accept="image/*" capture="environment" onchange="processImage(this, 'photo')">

        <div style="margin: 15px 0; border-top: 1px solid #eee;"></div>

        <input type="text" id="q" placeholder="Nome do produto...">
        <button class="btn btn-search" id="btn-search" onclick="runSearch()">🔍 Ver Preços</button>
        
        <button class="btn btn-ghost" onclick="toggleConfig(true)">⚙️ Configurar API Key</button>
    </div>

    <div id="output"></div>
</div>

<div id="config-panel">
    <h2>⚙️ Definições</h2>
    <p>Insere a tua Gemini API Key:</p>
    <input type="password" id="api-key" placeholder="AIza...">
    <button class="btn btn-cam" onclick="saveKey()">💾 Guardar</button>
    <button class="btn btn-ghost" onclick="toggleConfig(false)">Fechar</button>
</div>

<script>
// MANTIDO MOTOR 2.5 FLASH CONFORME SOLICITADO
const MODEL = "gemini-2.5-flash"; 

function toggleConfig(show) { document.getElementById('config-panel').style.display = show ? 'block' : 'none'; }

function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    if (key) { localStorage.setItem('gemini_key', key); alert("Chave guardada!"); toggleConfig(false); }
}

function setUI(loading) {
    const ids = ['btn-bar', 'btn-cam', 'btn-search'];
    ids.forEach(id => document.getElementById(id).disabled = loading);
    const out = document.getElementById('output');
    if (loading) { out.style.display = 'block'; out.innerHTML = '<span class="spin">⌛</span> A processar...'; }
}

async function geminiRequest(payload) {
    const key = localStorage.getItem('gemini_key');
    if (!key) throw new Error("Configura a API Key primeiro!");

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates[0].content.parts[0].text;
}

async function processImage(input, mode) {
    const file = input.files[0];
    if (!file) return;
    setUI(true);

    try {
        const base64 = await toBase64(file);
        const prompt = mode === 'barcode' ? "Extrai o número EAN deste código de barras. Responde apenas o número." : "Identifica este produto. Responde apenas: Marca e Nome.";
        
        const result = await geminiRequest({
            contents: [{ parts: [
                { inline_data: { mime_type: file.type, data: base64 } },
                { text: prompt }
            ]}]
        });

        document.getElementById('q').value = result.trim();
        await runSearch();
    } catch (e) {
        document.getElementById('output').innerHTML = `<div class="err-msg">❌ Erro: ${e.message}</div>`;
    } finally {
        setUI(false);
        input.value = ''; // Limpa o input para permitir repetir a mesma foto
    }
}

async function runSearch() {
    const query = document.getElementById('q').value;
    if (!query) return alert("Escreve um produto!");
    setUI(true);

    try {
        const result = await geminiRequest({
            contents: [{ parts: [{ text: `Pesquisa o preço de "${query}" em Portugal nos supermercados: Continente, Pingo Doce, Auchan e Lidl. Devolve uma tabela HTML simples.` }] }],
            tools: [{ google_search: {} }]
        });
        document.getElementById('output').innerHTML = `<div style="font-weight:bold; margin-bottom:10px;">Resultados para: ${query}</div>` + result;
    } catch (e) {
        document.getElementById('output').innerHTML = `<div class="err-msg">❌ Erro na pesquisa: ${e.message}</div>`;
    } finally {
        setUI(false);
    }
}

function toBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
    });
}
</script>

</body>
</html>
