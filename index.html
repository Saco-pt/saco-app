<!DOCTYPE html>
<html lang="pt-PT">
<body style="background: #000; color: #fff; font-family: sans-serif; padding: 20px;">
    <h2>Teste de Vida API</h2>
    <button onclick="teste()" style="padding:20px; width:100%">TESTAR AGORA</button>
    <div id="out" style="margin-top:20px; color: yellow;"></div>

    <script>
        async function teste() {
            const key = prompt("Cola a tua CHAVE NOVA aqui:");
            const out = document.getElementById('out');
            out.innerHTML = "A enviar pedido...";

            try {
                // O URL mais básico possível
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`;
                
                const r = await fetch(url, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents: [{parts: [{text: "Diz apenas a palavra SUCESSO"}]}]})
                });
                
                const d = await r.json();
                
                if(d.error) {
                    out.innerHTML = "❌ ERRO GOOGLE: " + d.error.message;
                } else {
                    out.innerHTML = "✅ RESPOSTA: " + d.candidates[0].content.parts[0].text;
                }
            } catch(e) {
                out.innerHTML = "❌ ERRO DE REDE: " + e.message;
            }
        }
    </script>
</body>
</html>
