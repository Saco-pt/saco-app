<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACO.pt | Comparador</title>
    <style>
        :root { --blue: #007aff; --green: #34c759; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h1 { color: var(--blue); text-align: center; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .add-btn { background: var(--blue); color: white; border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; }
        .item { background: #fafafa; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; }
        .compare-btn { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #res { margin-top: 20px; padding: 15px; background: #f0f9f1; border-radius: 12px; display: none; border-left: 4px solid var(--green); font-size: 14px; }
    </style>
</head>
<body>

<div class="app">
    <h1>🛒 SACO.133t</h1>
    <div class="input-group">
        <input type="text" id="p-input" placeholder="Ex: Sal, Massa...">
        <button class="add-btn" onclick="add()">+</button>
    </div>
    <div id="lista"></div>
    <button id="btn" class="compare-btn" onclick="analisar()">COMPARAR PREÇOS IA</button>
    <div id="res"></div>
    <p style="text-align:center; font-size:10px; color:#ccc; margin-top:20px; cursor:pointer;" onclick="localStorage.clear(); location.reload();">Resetar Chave API</p>
</div>

<script>
    let items = [];

    function add() {
        const input = document.getElementById('p-input');
        if (!input.value.trim()) return;
        items.push(input.value.trim());
        document.getElementById('lista').innerHTML = items.map(it => `<div class="item"><span>${it}</span></div>`).join('');
        input.value = '';
    }

    async function analisar() {
        let key = localStorage.getItem('saco_key');
        if (!key) {
            key = prompt("Insira a sua Chave API:");
            if (key) localStorage.setItem('saco_key', key);
        }

        const resDiv = document.getElementById('res');
        resDiv.style.display = "block";
        resDiv.innerHTML = "⏳ A analisar preços em Portugal...";

        // NOME TÉCNICO COMPLETO PARA EVITAR "NOT FOUND"
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${key}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Preços em Portugal (Pingo Doce, Continente, Lidl). Para: ${items.join(', ')}, qual o mais barato? Resposta curta.` }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                resDiv.innerHTML = "❌ Erro: " + data.error.message;
            } else {
                const aiText = data.candidates[0].content.parts[0].text;
                resDiv.innerHTML = "<b>Análise:</b><br>" + aiText.replace(/\n/g, '<br>');
            }
        } catch (e) {
            resDiv.innerHTML = "❌ Falha de ligação.";
        }
    }
</script>

</body>
</html>
