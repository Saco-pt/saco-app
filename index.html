<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Diagnostic Tool</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #log { margin-top: 20px; padding: 15px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; font-size: 13px; display: none; }
        .success { background: #e6ffed; border: 1px solid #28a745; color: #155724; display: block !important; }
        .error { background: #ffeef0; border: 1px solid #d73a49; color: #86181d; display: block !important; }
        .loading { background: #fff9e6; border: 1px solid #ffcc00; color: #856404; display: block !important; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧪 Gemini Key Tester</h2>
    <p style="font-size: 14px; color: #666;">Testa se a tua API Key está ativa e qual modelo ela suporta.</p>

    <label>Insere a tua API Key:</label>
    <input type="text" id="apiKey" placeholder="AIzaSy..." spellcheck="false">

    <label>Escolhe o Modelo para testar:</label>
    <select id="modelId">
        <option value="gemini-1.5-flash">Gemini 1.5 Flash (Recomendado)</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash Exp</option>
        <option value="gemini-pro">Gemini 1.0 Pro (Antigo)</option>
    </select>

    <button onclick="testKey()">Executar Teste de Conexão</button>

    <div id="log"></div>
</div>

<script>
    async function testKey() {
        const key = document.getElementById('apiKey').value.trim();
        const model = document.getElementById('modelId').value;
        const log = document.getElementById('log');

        if (!key) {
            alert("Por favor, insere uma chave primeiro!");
            return;
        }

        log.className = 'loading';
        log.innerHTML = `⏳ A contactar Google API via ${model}...`;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        
        const payload = {
            contents: [{ parts: [{ text: "Diz 'OK' se estiveres a funcionar." }] }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                log.className = 'success';
                log.innerHTML = `<strong>✅ SUCESSO!</strong>\n\n`;
                log.innerHTML += `<b>Resposta:</b> ${data.candidates[0].content.parts[0].text}\n`;
                log.innerHTML += `<b>Modelo:</b> ${model}\n`;
                log.innerHTML += `<b>Status:</b> 200 OK\n\n`;
                log.innerHTML += `A tua chave está configurada corretamente para este modelo.`;
            } else {
                log.className = 'error';
                log.innerHTML = `<strong>❌ FALHA NA LIGAÇÃO</strong>\n\n`;
                log.innerHTML += `<b>Erro:</b> ${data.error.status}\n`;
                log.innerHTML += `<b>Código:</b> ${data.error.code}\n`;
                log.innerHTML += `<b>Mensagem:</b> ${data.error.message}\n\n`;
                
                if (data.error.status === "NOT_FOUND") {
                    log.innerHTML += `💡 <b>Dica:</b> O modelo '${model}' não existe ou não está liberado para a tua conta. Tenta o 'gemini-1.5-flash'.`;
                } else if (data.error.status === "PERMISSION_DENIED") {
                    log.innerHTML += `💡 <b>Dica:</b> A chave é inválida ou as restrições de IP no Google Cloud estão a bloquear o acesso.`;
                } else if (data.error.code === 429) {
                    log.innerHTML += `💡 <b>Dica:</b> Cota esgotada! Espera 60 segundos.`;
                }
            }
        } catch (err) {
            log.className = 'error';
            log.innerHTML = `<strong>❌ ERRO DE REDE</strong>\n\n${err.message}`;
        }
    }
</script>

</body>
</html>
