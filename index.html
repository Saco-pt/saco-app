<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACO.pt | V21 Turbo</title>
    <style>
        :root { --blue: #4285f4; --green: #34a853; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 12px; color: #202124; }
        .container { max-width: 440px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--blue); margin: 0; }
        .badge { font-size: 10px; background: #333; color: #fff; padding: 4px 8px; border-radius: 12px; }

        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid #eee; }
        
        .btn-main { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            background: var(--blue); color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main:active { transform: scale(0.98); }

        input { 
            width: 100%; padding: 16px; border: 2px solid #f1f3f4; border-radius: 14px; 
            margin: 15px 0; font-size: 15px; outline: none; box-sizing: border-box;
        }

        #output { display: none; margin-top: 15px; background: white; border-radius: 20px; padding: 15px; border: 1px solid #eee; }
        
        /* Tabela de Preços Optimizada */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #f8f9fa; font-size: 14px; font-weight: 600; }
        .p-val { text-align: right; color: var(--blue); font-weight: 800; }
        .best-row { background: #e6f4ea; }
        .best-row .p-val { color: var(--green); }

        .loader { text-align: center; padding: 20px; font-weight: bold; color: #5f6368; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">SACO<span style="color:#bdc1c6">.pt</span></h1>
        <span class="badge">V21 TURBO</span>
    </div>

    <div class="card">
        <button class="btn-main" onclick="document.getElementById('cam').click()">
            📸 FOTOGRAFAR EMBALAGEM
        </button>
        <input type="file" id="cam" style="display:none" accept="image/*" capture="environment" onchange="fastProcess(event)">
        
        <input type="text" id="q" placeholder="Ou escreve o nome...">
        <button class="btn-main" style="background: var(--green); padding: 14px; font-size: 14px;" onclick="manualSearch()">
            🔍 COMPARAR AGORA
        </button>
        <p style="text-align:center; font-size:11px; color:#ccc; cursor:pointer; margin-top:10px" onclick="setKey()">⚙️ API KEY</p>
    </div>

    <div id="output"></div>
</div>

<script>
const MODEL = "gemini-1.5-flash"; // Mais rápido para deteção on-the-fly

function setKey() {
    const k = prompt("API Key:", localStorage.getItem('gem_key')||"");
    if(k) localStorage.setItem('gem_key', k.trim());
}

// --- CORE: REDIMENSIONAMENTO PARA VELOCIDADE ---
async function shrinkImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 800; // Resolução ideal para IA ler rótulos/barras
                let w = img.width, h = img.height;
                if (w > h && w > MAX) { h *= MAX/w; w = MAX; }
                else if (h > MAX) { w *= MAX/h; h = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve({
                    base64: canvas.toDataURL('image/jpeg', 0.6).split(',')[1],
                    mime: 'image/jpeg'
                });
            };
        };
    });
}

async function fastProcess(event) {
    const file = event.target.files[0];
    const key = localStorage.getItem('gem_key');
    if(!key || !file) return setKey();

    const out = document.getElementById('output');
    out.style.display = 'block';
    out.innerHTML = '<div class="loader"><div class="spinner"></div>A comprimir e enviar...</div>';

    try {
        // 1. Shrink imediato (corre no telemóvel em milisegundos)
        const imgData = await shrinkImage(file);
        event.target.value = ""; // Zero Storage: limpa o rasto do ficheiro

        out.innerHTML = '<div class="loader"><div class="spinner"></div>A identificar produto...</div>';

        // 2. Identificação Ultra-Rápida
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                contents: [{ parts: [
                    { inline_data: { mime_type: imgData.mime, data: imgData.base64 } },
                    { text: "Identifica marca e nome deste produto. Sê breve (max 5 palavras). Responde apenas o nome." }
                ]}],
                generationConfig: { maxOutputTokens: 20, temperature: 0 }
            })
        });
        
        const data = await resp.json();
        const productName = data.candidates[0].content.parts[0].text.trim();
        document.getElementById('q').value = productName;
        
        // 3. Disparar Comparador
        startSniper(productName);

    } catch (e) { out.innerHTML = "❌ Erro na deteção rápida."; }
}

function manualSearch() { 
    const val = document.getElementById('q').value;
    if(val) startSniper(val); 
}

async function startSniper(product) {
    const key = localStorage.getItem('gem_key');
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.innerHTML = `<div class="loader"><div class="spinner"></div>A caçar preços para:<br><b>${product}</b></div>`;

    try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Pesquisa o preço de "${product}" em Portugal (Continente, Pingo Doce, Auchan, Lidl, Intermarché). 
                Gera apenas uma tabela HTML <table> com as colunas Loja e Preço. 
                Usa a classe 'best-row' para a linha do preço mais baixo. Sem texto extra.` }] }],
                tools: [{ google_search: {} }],
                safetySettings: [{category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE"}]
            })
        });

        const data = await resp.json();
        out.innerHTML = `
            <div style="font-size:12px; font-weight:bold; color:var(--blue); margin-bottom:8px;">PREÇOS HOJE:</div>
            ${data.candidates[0].content.parts[0].text}
            <p style="text-align:center; font-size:10px; color:#999; margin-top:15px;">Atualizado via Google Search.</p>
        `;
    } catch (e) { out.innerHTML = "❌ Erro ao obter preços."; }
}
</script>
</body>
</html>
